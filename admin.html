<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - FawakihAI</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: Tahoma, sans-serif; background-color: #0f0f0f; color: #e0e0e0; margin: 0; padding: 20px; }
        .header { background-color: #1a1a1a; padding: 20px; border-radius: 10px; margin-bottom: 20px; border-bottom: 3px solid #E91E63; text-align: center; }
        h1 { margin: 0; color: #E91E63; }
        .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .card { background-color: #1a1a1a; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h3 { border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; color: #4CAF50; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #2c2c2c; border: 1px solid #444; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #E91E63; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:hover { background: #c2185b; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; border-bottom: 1px solid #333; text-align: right; }
        th { color: #E91E63; }
        .status-active { color: #4CAF50; font-weight: bold; }
        .status-inactive { color: #f44336; font-weight: bold; }
        .code-box { background: #000; padding: 10px; text-align: center; font-size: 18px; color: #00FF00; letter-spacing: 2px; margin-top: 10px; border-radius: 5px; user-select: all;}
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="header">
        <h1>[Remas System] لوحة التحكم والأمان</h1>
        <p>إدارة أكواد الاشتراك والمستخدمين النشطين</p>
    </div>

    <div class="grid">
        <div class="card">
            <h3>🔑 توليد كود اشتراك</h3>
            <label>مدة الاشتراك (بالأيام):</label>
            <input type="number" id="codeDays" value="30" min="1">
            <button onclick="generateCode()">توليد الكود الآن</button>
            <div id="generatedCode" class="code-box" style="display:none;"></div>
        </div>

        <div class="card">
            <h3>👥 المشتركون</h3>
            <table>
                <thead>
                    <tr>
                        <th>المستخدم</th>
                        <th>تاريخ الانتهاء</th>
                        <th>الكود</th>
                        <th>الحالة</th>
                    </tr>
                </thead>
                <tbody id="usersTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyApqVwnKmq0gJ7k-UM-jLNxaYlBPkRx1Go",
            authDomain: "chatlive-4387e.firebaseapp.com",
            databaseURL: "https://chatlive-4387e-default-rtdb.firebaseio.com",
            projectId: "chatlive-4387e",
            storageBucket: "chatlive-4387e.firebasestorage.app",
            messagingSenderId: "722728428486",
            appId: "1:722728428486:android:847b11a7743dfb7d5ac8c7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function generateCode() {
            const days = parseInt(document.getElementById('codeDays').value);
            if (!days || days < 1) return alert("أدخل عدد أيام صحيح");

            const randomStr = Math.random().toString(36).substring(2, 10).toUpperCase();
            const newCode = "FAW-" + randomStr;

            db.ref('System/Codes/' + newCode).set({
                durationDays: days, isActive: true, createdAt: Date.now()
            }).then(() => {
                const box = document.getElementById('generatedCode');
                box.style.display = "block"; box.innerText = newCode;
            });
        }

        db.ref('System/Users').on('value', (snapshot) => {
            const tbody = document.getElementById('usersTableBody');
            tbody.innerHTML = '';
            
            if (snapshot.exists()) {
                snapshot.forEach((childSnapshot) => {
                    const user = childSnapshot.key;
                    const data = childSnapshot.val();
                    const expiryDate = new Date(data.expiryTime);
                    const isExpired = Date.now() > data.expiryTime;
                    const statusText = isExpired ? '<span class="status-inactive">منتهي 🔴</span>' : '<span class="status-active">نشط 🟢</span>';
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${user}</td><td dir="ltr">${expiryDate.toLocaleString('en-GB')}</td><td>${data.codeUsed}</td><td>${statusText}</td>`;
                    tbody.appendChild(tr);
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">لا يوجد مستخدمين بعد</td></tr>';
            }
        });
    </script>
</body>
</html>
