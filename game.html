<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fawakih AI - اللعبة</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121212; color: #fff;
            text-align: center;
        }
        .header { background: #1A237E; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .header h2 { margin: 0; font-size: 20px; }
        .exit-btn { background: #D32F2F; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        
        .status-bar { margin: 15px; font-weight: bold; font-size: 16px; color: #4CAF50; }
        .timer { font-size: 40px; font-weight: bold; color: #FFEB3B; margin: 10px 0; }
        
        .fruits-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 15px; padding: 20px; max-width: 500px; margin: 0 auto;
        }
        .fruit-box {
            background: #333; border-radius: 10px; padding: 20px;
            font-size: 30px; transition: background 0.3s; border: 2px solid #444;
        }
        .highlighted { background-color: rgba(255, 152, 0, 0.8) !important; border-color: #FF9800; }
        
        .controls { margin-top: 20px; padding: 0 20px; }
        input[type="text"] {
            width: 80%; max-width: 300px; padding: 12px;
            border-radius: 8px; border: none; text-align: center; font-size: 16px;
        }
        button.btn-main {
            display: block; width: 80%; max-width: 300px; margin: 15px auto;
            padding: 15px; background: #FF9800; color: #fff; border: none;
            border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer;
        }
        button.btn-main:disabled { background: #555; cursor: not-allowed; }
        
        .footer { margin-top: 30px; font-size: 12px; color: #aaa; cursor: pointer; padding-bottom: 20px;}
    </style>
</head>
<body>

    <div class="header">
        <h2>Fawakih AI 🤖</h2>
        <button class="exit-btn" onclick="logout()">خروج</button>
    </div>

    <div class="status-bar" id="aiStatusText">حالة الذاكرة: نشطة (العقل 1) 🟢</div>
    <div class="timer" id="timerText">00</div>

    <div class="fruits-grid" id="fruitsContainer">
        </div>

    <div class="controls">
        <input type="text" id="inputFruit" placeholder="أدخل الفاكهة الصحيحة هنا..." onkeypress="handleEnter(event)">
        <button class="btn-main" id="btnNewRound" onclick="processAndStartRound()">بدء جولة جديدة</button>
    </div>

    <div class="footer" onclick="alert('FawakihAI\n© جميع الحقوق محفوظة لـ Hamza Alhumada')">
        © جميع الحقوق محفوظة لـ Hamza Alhumada
    </div>

    <script>
        // التحقق من الحماية
        if(localStorage.getItem("FawakihaSecure2026X") !== "active") {
            window.location.href = "index.html";
        }

        // --- خوارزميات الذكاء الاصطناعي (مأخوذة من كود الجافا) ---
        let aiData = {
            1: { occurrences: {}, history: [] },
            2: { occurrences: {}, history: [] }
        };
        let currentAI = 1;
        let wrongGuessesCount = 0;
        let lastRoundGuesses = [];
        let isAIActive = true;
        let countdownTimer = null;

        const fruitTranslations = {
            "عنب": "grape", "ليمون": "lemon", "برتقال": "orange",
            "تفاح": "apple", "كرز": "cherry", "بطيخ": "watermelon",
            "فراولة": "strawberry", "فراوله": "strawberry", "مانجو": "mango"
        };
        const validFruitsAr = Object.keys(fruitTranslations);
        
        const fruitIcons = {
            "grape": "🍇", "lemon": "🍋", "orange": "🍊", "apple": "🍎",
            "cherry": "🍒", "watermelon": "🍉", "strawberry": "🍓", "mango": "🥭"
        };

        // إنشاء واجهة الفواكه
        const grid = document.getElementById('fruitsContainer');
        Object.keys(fruitIcons).forEach(key => {
            let div = document.createElement('div');
            div.className = 'fruit-box';
            div.id = `fruit_${key}`;
            div.innerText = fruitIcons[key];
            grid.appendChild(div);
        });

        function logout() {
            localStorage.removeItem("FawakihaSecure2026X");
            window.location.href = "index.html";
        }

        function handleEnter(e) {
            if (e.key === 'Enter') {
                processAndStartRound();
            }
        }

        function updateAIStatusUI() {
            const statusEl = document.getElementById('aiStatusText');
            if (isAIActive) {
                statusEl.innerText = `حالة الذاكرة: نشطة (العقل ${currentAI}) 🟢`;
                statusEl.style.color = "#4CAF50";
            }
        }

        function processAndStartRound() {
            const inputEl = document.getElementById('inputFruit');
            const fruitName = inputEl.value.trim();
            
            if (fruitName !== "") {
                if (!validFruitsAr.includes(fruitName)) {
                    alert("🤖 نظام الذكاء الاصطناعي\n\nعذراً، لم أتمكن من العثور على هذا المدخل. يرجى إدخال إحدى الفواكه المعتمدة:\nعنب | ليمون | برتقال | تفاح | كرز | بطيخ | فراولة | مانجو");
                    return;
                }
                processUserFruit(fruitName);
                inputEl.value = "";
            }
            startNewRound();
        }

        function processUserFruit(fruitName) {
            if (!isAIActive) return;

            let translated = fruitTranslations[fruitName];
            if (!translated) return;

            // التحقق من الإخفاقات
            if (lastRoundGuesses.length > 0) {
                if (!lastRoundGuesses.includes(translated)) {
                    wrongGuessesCount++;
                } else {
                    wrongGuessesCount = 0;
                }
            }

            // التبديل بين الخوارزميتين
            if (wrongGuessesCount > 3) {
                currentAI = (currentAI === 1) ? 2 : 1;
                wrongGuessesCount = 0;
                updateAIStatusUI();
                alert(`تم تبديل الذاكرة الاصطناعية (العقل ${currentAI}) لتحسين الأداء!`);
            }

            // تخزين البيانات في العقل النشط
            let activeAI = aiData[currentAI];
            activeAI.occurrences[translated] = (activeAI.occurrences[translated] || 0) + 1;
            activeAI.history.push(translated);

            // نسيان ما يتخطى 10
            if (activeAI.history.length > 10) {
                let forgottenFruit = activeAI.history.shift();
                if (activeAI.occurrences[forgottenFruit] > 1) {
                    activeAI.occurrences[forgottenFruit]--;
                } else {
                    delete activeAI.occurrences[forgottenFruit];
                }
            }
        }

        function startNewRound() {
            // تصفير الألوان
            document.querySelectorAll('.fruit-box').forEach(el => el.classList.remove('highlighted'));

            let predictionWeights = {};
            let isConfirmedGuess = false;

            // أوزان عشوائية أساسية (1-5)
            Object.keys(fruitIcons).forEach(name => {
                predictionWeights[name] = Math.floor(Math.random() * 5) + 1;
            });

            // استثناءات الجولة السابقة (نفس الكود الأصلي)
            if (lastRoundGuesses.includes("cherry")) delete predictionWeights["cherry"];
            if (lastRoundGuesses.includes("watermelon")) delete predictionWeights["watermelon"];

            if (isAIActive) {
                let activeAI = aiData[currentAI];
                
                for (let [fruit, count] of Object.entries(activeAI.occurrences)) {
                    if (predictionWeights[fruit] !== undefined) {
                        if (count === 2) {
                            predictionWeights[fruit] = Math.floor(Math.random() * 11) + 5; // 5-15
                            isConfirmedGuess = true;
                        } else if (count >= 4) {
                            predictionWeights[fruit] = Math.floor(Math.random() * 16) + 5; // 5-20
                            isConfirmedGuess = true;
                        }
                    }
                }

                if (activeAI.history.length >= 9) {
                    if (Math.random() < 0.40) { // 40%
                        let targetIndex = Math.random() < 0.5 ? 1 : 2;
                        let smartFruit = activeAI.history[targetIndex];
                        if (predictionWeights[smartFruit] !== undefined) {
                            predictionWeights[smartFruit] = Math.floor(Math.random() * 11) + 20; // 20-30
                            isConfirmedGuess = true;
                        }
                    }
                }
            }

            let totalWeight = 0;
            let maxWeight = 0;
            for (let weight of Object.values(predictionWeights)) {
                totalWeight += weight;
                if (weight > maxWeight) maxWeight = weight;
            }

            let confidencePercentage = (totalWeight > 0) ? Math.floor((maxWeight * 100) / totalWeight) : 0;
            let boxesToShow = (isConfirmedGuess && confidencePercentage >= 65) ? 3 : 4;

            // نظام اليانصيب
            let lotteryList = [];
            for (let [fruit, weight] of Object.entries(predictionWeights)) {
                for (let i = 0; i < weight; i++) {
                    lotteryList.push(fruit);
                }
            }

            // خلط القائمة (Shuffle)
            lotteryList.sort(() => Math.random() - 0.5);

            let finalGuesses = [];
            for (let fruit of lotteryList) {
                if (!finalGuesses.includes(fruit)) {
                    finalGuesses.push(fruit);
                }
                if (finalGuesses.length === boxesToShow) break;
            }

            lastRoundGuesses = [...finalGuesses];

            // تلوين التوقعات
            finalGuesses.forEach(fruit => {
                let box = document.getElementById(`fruit_${fruit}`);
                if(box) box.classList.add('highlighted');
            });

            // تعطيل الزر وتشغيل المؤقت
            let btn = document.getElementById('btnNewRound');
            btn.disabled = true;
            
            if (countdownTimer) clearInterval(countdownTimer);
            
            let timeLeft = Math.floor(Math.random() * 16) + 23; // 23 - 38 ثانية (نفس الكود الأصلي)
            let timerEl = document.getElementById('timerText');
            
            timerEl.innerText = timeLeft;
            countdownTimer = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdownTimer);
                    timerEl.innerText = "00";
                    btn.disabled = false;
                }
            }, 1000);
        }
    </script>

</body>
</html>
