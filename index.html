<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Delt.io</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            margin: 0;
            padding: 0;
            display: block;
            pointer-events: auto;
        }
        #btn-beta {
            position: fixed;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            padding: 10px 16px;
            background: #222;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            z-index: 999999;
            font-size: 16px;
        }
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999999;
            font-family: sans-serif;
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #fff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <button id="btn-beta">دخولbeta 2</button>

    <div id="loading-screen">
        <div class="spinner"></div>
        <h2>يرجى الانتضار</h2>
        <p>لللمعلوميه ريماس قامت بتطويرها لكم🌷</p>
    </div>

    <iframe src="https://delt.io/" allowfullscreen="true"></iframe>

    <script>
        const btnBeta = document.getElementById("btn-beta");
        const loadingScreen = document.getElementById("loading-screen");

        btnBeta.addEventListener("click", () => {
            loadingScreen.style.display = "flex";
            btnBeta.style.display = "none";
            
            setTimeout(() => {
                loadingScreen.style.display = "none";
            }, 3000);
        });
    </script>
</body>
</html>
