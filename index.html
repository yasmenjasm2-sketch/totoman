<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Delt.io - Remas</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
        }
        
        /* إعداد الإطار ليكون مرناً ولا يمنع اللمس نهائياً */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            margin: 0;
            padding: 0;
            display: block;
            pointer-events: auto;
            z-index: 1; /* اللعبة في الطبقة السفلية */
        }

        #btn-beta, #btn-wss {
            position: fixed;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            padding: 10px 16px;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            z-index: 999999; /* الأزرار في الطبقة العلوية */
            font-size: 16px;
            font-family: sans-serif;
        }

        #btn-beta {
            background: #222;
        }

        #btn-wss {
            background: #007bff;
            display: none; /* مخفي حتى ينتهي التحميل */
        }

        /* تنسيق زر Fans الجديد ليكون أسفل الزر الأول بشكل أنيق */
        #btn-fans {
            position: fixed;
            top: calc(50% + 55px); /* تم وضعه أسفل الزر الأول بقليل */
            right: 20px;
            transform: translateY(-50%);
            padding: 10px 16px;
            color: #fff;
            background: #ff4757; /* لون مميز واحترافي */
            border: none;
            border-radius: 8px;
            cursor: pointer;
            z-index: 999999;
            font-size: 16px;
            font-family: sans-serif;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); /* إضافة ظل خفيف للأناقة */
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999999;
            font-family: sans-serif;
            text-align: center;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #fff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <button id="btn-beta">دخولbeta 2</button>
    <button id="btn-wss">WSS</button>
    <!-- زر Fans الجديد -->
    <button id="btn-fans">Fans</button>

    <div id="loading-screen">
        <div class="spinner"></div>
        <h2>يرجى الانتضار</h2>
        <p>لللمعلوميه ريماس قامت بتطويرها لكم🌷</p>
    </div>

    <iframe id="game-frame" src="https://delt.io/" allowfullscreen="true"></iframe>

    <script>
        const btnBeta = document.getElementById("btn-beta");
        const btnWss = document.getElementById("btn-wss");
        const loadingScreen = document.getElementById("loading-screen");
        const btnFans = document.getElementById("btn-fans"); // تعريف الزر الجديد
        
        let lastWSS = "";
        let fansTabWindow = null; // متغير لحفظ حالة التبويب الثاني

        // التقاط أي WebSocket يتم فتحه
        const OriginalWebSocket = window.WebSocket;
        window.WebSocket = function(url, protocols) {
            if (url.includes('wss://')) {
                lastWSS = url;
            }
            return new OriginalWebSocket(url, protocols);
        };

        btnBeta.addEventListener("click", () => {
            // طلب ملء الشاشة وقلبها أفقياً (Landscape)
            try {
                const docElm = document.documentElement;
                if (docElm.requestFullscreen) {
                    docElm.requestFullscreen().then(() => {
                        if (screen.orientation && screen.orientation.lock) {
                            screen.orientation.lock("landscape").catch(e => console.log("توجيه الشاشة غير مدعوم أو مرفوض:", e));
                        }
                    }).catch(e => console.log(e));
                }
            } catch (e) {
                console.log("خطأ في ملء الشاشة:", e);
            }

            // إظهار التحميل وإخفاء زر الدخول
            loadingScreen.style.display = "flex";
            btnBeta.style.display = "none";
            
            // بعد 3 ثواني، إخفاء شاشة التحميل وإظهار زر النسخ
            setTimeout(() => {
                loadingScreen.style.display = "none";
                btnWss.style.display = "block";
            }, 3000);
        });

        // أمر النسخ عند الضغط على زر WSS
        btnWss.addEventListener("click", () => {
            if (lastWSS) {
                const tempInput = document.createElement("input");
                tempInput.value = lastWSS;
                document.body.appendChild(tempInput);
                tempInput.select();
                try {
                    document.execCommand("copy");
                    alert("تم نسخ: " + lastWSS);
                } catch (err) {
                    console.error("فشل النسخ", err);
                }
                document.body.removeChild(tempInput);
            } else {
                alert("لم يتم العثور على WSS بعد، انتظر تحميل اللعبة.");
            }
        });

        // برمجة زر Fans الجديد
        btnFans.addEventListener("click", () => {
            // ضع هنا الرابط الذي تريد فتحه في التبويب الثاني
            const urlToOpen = "https://yasmenjasm2-sketch.github.io/totoman/"; 

            // التحقق مما إذا كان التبويب الثاني مفتوحاً مسبقاً ولم يتم إغلاقه
            if (fansTabWindow && !fansTabWindow.closed) {
                // إذا كان مفتوحاً، قم بالتبديل إليه فقط
                fansTabWindow.focus();
            } else {
                // إذا لم يكن مفتوحاً، افتح تبويب جديد باسم ثابت لمنع فتح أكثر من نسخة
                fansTabWindow = window.open(urlToOpen, "RemasFansTab");
            }
        });
    </script>
</body>
</html>
