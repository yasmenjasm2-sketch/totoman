<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Remas Mobile - senpa.io</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --accent: #ff416c;
            --bg: #050b14;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg); overflow: hidden;
            font-family: sans-serif;
        }

        /* حاوية اللعبة */
        #game-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        iframe {
            width: 100%; height: 100%; border: none;
        }

        /* واجهة التحكم (الأزرار) */
        .controls-overlay {
            position: absolute; bottom: 20px; left: 0; right: 0;
            z-index: 10; display: flex; justify-content: space-around;
            pointer-events: none; /* لكي لا تمنع اللمس عن اللعبة إلا عند ضغط الأزرار */
        }

        .btn-touch {
            width: 70px; height: 70px; background: rgba(0, 242, 254, 0.2);
            border: 2px solid var(--primary); border-radius: 50%;
            backdrop-filter: blur(5px); color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; pointer-events: auto;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
            -webkit-user-select: none;
        }

        .btn-touch:active { transform: scale(0.9); background: var(--primary); color: #000; }

        /* شريط علوي بسيط */
        .top-bar {
            position: absolute; top: 0; width: 100%; height: 40px;
            background: rgba(10, 15, 25, 0.8); z-index: 10;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; box-sizing: border-box; border-bottom: 1px solid var(--primary);
        }

        .brand { font-size: 14px; font-weight: bold; color: var(--primary); }

        /* نافذة السكربتات السريعة للهاتف */
        #script-panel {
            position: absolute; top: 50px; right: -250px; width: 220px;
            background: rgba(20, 25, 40, 0.9); border: 1px solid var(--primary);
            border-radius: 10px 0 0 10px; z-index: 100; transition: 0.3s;
            padding: 10px;
        }

        .panel-open { right: 0 !important; }

        .script-item {
            background: #1a1f2e; margin-bottom: 8px; padding: 8px;
            border-radius: 5px; font-size: 12px; cursor: pointer; border: 1px solid #333;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="brand">REMAS MOBILE</div>
        <div onclick="togglePanel()" style="color: var(--primary);"><i class="fas fa-code"></i></div>
    </div>

    <div id="script-panel">
        <h4 style="margin-bottom:10px; font-size:14px; color: var(--primary);">سكربتات سريعة</h4>
        <div class="script-item" onclick="applyScript('macro')">تفعيل ماكرو (سريع)</div>
        <div class="script-item" onclick="applyScript('zoom')">تفعيل زووم هاتف</div>
        <div class="script-item" onclick="alert('انسخ الكود من الصفحة الرئيسية')">نسخ يدوي</div>
    </div>

    <div id="game-wrapper">
        <iframe id="senpa-frame" src="https://senpa.io"></iframe>
    </div>

    <div class="controls-overlay">
        <div class="btn-touch" id="btn-split" ontouchstart="sendKey(32)">
            <i class="fas fa-cut"></i> </div>
        <div class="btn-touch" id="btn-feed" ontouchstart="sendKey(87)" style="border-color: var(--accent);">
            <i class="fas fa-circle"></i> </div>
    </div>

    <script>
        // دالة لإرسال الأوامر للعبة داخل الـ iframe
        function sendKey(keyCode) {
            const frame = document.getElementById('senpa-frame');
            // ملاحظة: الألعاب غالباً تمنع التحكم الخارجي المباشر لأسباب أمنية
            // لكننا هنا نوفر الواجهة، واللاعب يستخدم السكربت الذي توفره أنت للربط
            console.log("Sending key: " + keyCode);
            
            // إذا كان المستخدم قد ثبت سكربت Remas، السكربت سيتعرف على هذه الأوامر
        }

        function togglePanel() {
            document.getElementById('script-panel').classList.toggle('panel-open');
        }

        function applyScript(type) {
            alert("سيتم تفعيل سكربت الـ " + type + " المخصص للهاتف");
            togglePanel();
        }

        // منع الزووم الافتراضي للمتصفح عند الضغط المتكرر
        document.addEventListener('touchstart', function (event) {
            if (event.touches.length > 1) { event.preventDefault(); }
        }, { passive: false });
    </script>
</body>
</html>
