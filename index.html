<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>🔴 Delt.io - Remas</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
        }
        
        /* إعدادات مشتركة للإطارات */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            margin: 0;
            padding: 0;
            display: block;
        }

        /* إطار اللعبة الأصلية - يبقى يعمل في الخلفية دائماً */
        #game-frame {
            z-index: 1; 
            pointer-events: auto;
        }

        /* إطار صفحة الفانز (مخفي في البداية) */
        #fans-frame {
            z-index: 2;
            visibility: hidden; 
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease; 
        }

        /* تنسيق الأزرار لتكون في نفس المكان */
        #btn-beta, #btn-fans, #btn-wss {
            position: fixed;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            padding: 10px 16px;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            z-index: 999999; 
            font-size: 16px;
            font-family: sans-serif;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: 0.2s;
        }

        #btn-beta { 
            background: #222; 
        }

        #btn-wss {
            background: #007bff;
            display: none; /* مخفي افتراضياً بناء على طلبك */
        }

        #btn-fans {
            background: #ff4757; 
            display: none; /* يظهر فقط بعد اختفاء زر بيتا */
        }

        #btn-fans:hover {
            transform: translateY(-50%) scale(1.05);
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999999;
            font-family: sans-serif;
            text-align: center;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #fff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <button id="btn-beta">دخول beta 2</button>
    <button id="btn-wss">WSS</button>
    <button id="btn-fans">Fans</button>

    <div id="loading-screen">
        <div class="spinner"></div>
        <h2>يرجى الانتظار</h2>
        <p>للمعلومية ريماس قامت بتطويرها لكم 🌷</p>
    </div>

    <iframe id="game-frame" src="https://delt.io/" allowfullscreen="true"></iframe>
    
    <iframe id="fans-frame" src="https://yasmenjasm2-sketch.github.io/totoman/" allowfullscreen="true"></iframe>

    <script>
        const btnBeta = document.getElementById("btn-beta");
        const btnWss = document.getElementById("btn-wss");
        const btnFans = document.getElementById("btn-fans"); 
        const loadingScreen = document.getElementById("loading-screen");
        const fansFrame = document.getElementById("fans-frame");
        const gameFrame = document.getElementById("game-frame");
        
        let lastWSS = "";
        let isAwake = false;
        let isFansVisible = false;

        // دالة لمنع المتصفح من إدخال الصفحة في وضع النوم
        function keepPageAwake() {
            if (isAwake) return;
            isAwake = true;

            const silentAudio = new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA");
            silentAudio.loop = true;
            silentAudio.play().catch(e => console.log("الصوت الصامت ينتظر تفاعل المستخدم"));

            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen').catch(err => console.log("Wake Lock Error:", err));
            }
        }

        document.addEventListener("click", keepPageAwake, { once: true });
        document.addEventListener("keydown", keepPageAwake, { once: true });

        // التقاط رابط WSS في الخلفية (حتى لو الزر مخفي)
        const OriginalWebSocket = window.WebSocket;
        window.WebSocket = function(url, protocols) {
            if (url.includes('wss://')) {
                lastWSS = url;
                console.log("تم التقاط WSS:", lastWSS); // طباعته في الكونسول للفائدة
            }
            return new OriginalWebSocket(url, protocols);
        };

        // برمجة زر Beta 2
        btnBeta.addEventListener("click", () => {
            keepPageAwake(); 

            // طلب ملء الشاشة
            try {
                const docElm = document.documentElement;
                if (docElm.requestFullscreen) {
                    docElm.requestFullscreen().then(() => {
                        if (screen.orientation && screen.orientation.lock) {
                            screen.orientation.lock("landscape").catch(e => console.log("توجيه الشاشة غير مدعوم:", e));
                        }
                    }).catch(e => console.log(e));
                }
            } catch (e) {
                console.log("خطأ في ملء الشاشة:", e);
            }

            // إظهار شاشة التحميل وإخفاء زر بيتا وزر wss
            loadingScreen.style.display = "flex";
            btnBeta.style.display = "none";
            btnWss.style.display = "none"; // تأكيد إخفاء زر wss
            
            // بعد 3 ثواني، إخفاء شاشة التحميل وإظهار زر الفانز مكانه
            setTimeout(() => {
                loadingScreen.style.display = "none";
                btnFans.style.display = "block"; // ظهور زر الفانز
            }, 3000);
        });

        // برمجة زر Fans للتبديل بتغطية اللعبة (وليس إخفائها لتجنب اكتشاف الخروج)
        btnFans.addEventListener("click", () => {
            keepPageAwake(); 
            isFansVisible = !isFansVisible; 

            if (isFansVisible) {
                // إظهار طبقة الفانز فوق اللعبة
                fansFrame.style.visibility = "visible";
                fansFrame.style.opacity = "1";
                fansFrame.style.pointerEvents = "auto";
                
                btnFans.innerText = "العودة للعبة";
                btnFans.style.background = "#2ed573"; 
            } else {
                // إزالة طبقة الفانز والعودة للعبة
                fansFrame.style.visibility = "hidden";
                fansFrame.style.opacity = "0";
                fansFrame.style.pointerEvents = "none";
                
                btnFans.innerText = "Fans";
                btnFans.style.background = "#ff4757"; 
                
                // إعادة التركيز (Focus) للعبة فوراً
                gameFrame.contentWindow.focus();
            }
        });

        // اختصار كيبورد (زر Tab) للتبديل السريع
        document.addEventListener("keydown", (e) => {
            if (e.code === "Tab") {
                e.preventDefault(); 
                btnFans.click(); 
            }
        });

    </script>
</body>
</html>
