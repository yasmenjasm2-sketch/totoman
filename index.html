<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Senpa.io Mobile Control</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* إطار اللعبة ليأخذ الشاشة كاملة */
        #game-frame {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* حاوية الأزرار فوق اللعبة */
        .controls {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            box-sizing: border-box;
            z-index: 10;
            pointer-events: none; /* للسماح بلمس الشاشة للتوجيه في المساحات الفارغة */
        }

        /* تصميم الأزرار لتكون مناسبة للهاتف */
        .btn {
            width: 80px;
            height: 80px;
            background-color: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            font-family: Arial, sans-serif;
            font-weight: bold;
            pointer-events: auto; /* تفعيل اللمس للأزرار فقط */
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* تأثير عند الضغط */
        .btn:active {
            background-color: rgba(255, 255, 255, 0.6);
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <iframe id="game-frame" src="https://senpa.io"></iframe>

    <div class="controls">
        <div class="btn" id="btn-feed">Feed (E)</div>
        <div class="btn" id="btn-shoot">Shoot (Enter)</div>
    </div>

    <script>
        const gameFrame = document.getElementById('game-frame');
        const btnFeed = document.getElementById('btn-feed');
        const btnShoot = document.getElementById('btn-shoot');

        // دالة لمحاكاة الضغط على الأزرار
        function triggerKey(key, keyCode) {
            try {
                // محاولة الوصول إلى نافذة اللعبة لإرسال الأحداث
                const iframeWindow = gameFrame.contentWindow;
                
                const eventDown = new KeyboardEvent('keydown', {
                    key: key,
                    keyCode: keyCode,
                    code: key === 'Enter' ? 'Enter' : 'KeyE',
                    bubbles: true
                });
                
                const eventUp = new KeyboardEvent('keyup', {
                    key: key,
                    keyCode: keyCode,
                    code: key === 'Enter' ? 'Enter' : 'KeyE',
                    bubbles: true
                });
                
                iframeWindow.document.dispatchEvent(eventDown);
                setTimeout(() => {
                    iframeWindow.document.dispatchEvent(eventUp);
                }, 50);

            } catch (error) {
                // سيظهر هذا الخطأ في المتصفح العادي بسبب سياسة CORS
                console.warn("تعذر إرسال الحدث بسبب قيود CORS:", error);
            }
        }

        // استخدام touchstart بدلاً من click لاستجابة أسرع على شاشات اللمس
        btnFeed.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            triggerKey('e', 69);
        });

        btnShoot.addEventListener('touchstart', (e) => {
            e.preventDefault();
            triggerKey('Enter', 13);
        });
    </script>

</body>
</html>
