<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delt.io Mobile Controller</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }

        /* إطار اللعبة */
        #game-frame {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* حاوية أزرار التحكم */
        .controls {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 10;
            pointer-events: none;
        }

        /* تصميم الزر */
        .btn {
            width: 90px;
            height: 90px;
            background-color: rgba(0, 0, 0, 0.5);
            border: 3px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            pointer-events: auto;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: transform 0.1s, background-color 0.1s;
        }

        .btn span {
            font-size: 12px;
            opacity: 0.8;
        }

        .btn strong {
            font-size: 18px;
        }

        /* تأثير عند الضغط */
        .btn:active {
            background-color: rgba(219, 0, 40, 0.7);
            transform: scale(0.9);
            border-color: #fff;
        }

        /* زر الإطلاق (Enter) بجهة والـ Feed (E) بجهة */
        #btn-shoot {
            order: 2; /* يمين */
        }
        #btn-feed {
            order: 1; /* يسار */
        }
    </style>
</head>
<body>

    <iframe id="game-frame" src="https://delt.io/"></iframe>

    <div class="controls">
        <div class="btn" id="btn-feed">
            <strong>E</strong>
            <span>FEED</span>
        </div>
        <div class="btn" id="btn-shoot">
            <strong>Enter</strong>
            <span>SHOOT</span>
        </div>
    </div>

    <script>
        const gameFrame = document.getElementById('game-frame');

        function sendKey(keyName, keyCode) {
            try {
                const targetWindow = gameFrame.contentWindow;
                
                // إنشاء حدث الضغط للأسفل
                const downEvent = new KeyboardEvent('keydown', {
                    key: keyName,
                    keyCode: keyCode,
                    code: keyName === 'Enter' ? 'Enter' : 'KeyE',
                    which: keyCode,
                    bubbles: true,
                    view: window
                });

                // إنشاء حدث رفع الإصبع
                const upEvent = new KeyboardEvent('keyup', {
                    key: keyName,
                    keyCode: keyCode,
                    code: keyName === 'Enter' ? 'Enter' : 'KeyE',
                    which: keyCode,
                    bubbles: true,
                    view: window
                });

                targetWindow.document.dispatchEvent(downEvent);
                setTimeout(() => {
                    targetWindow.document.dispatchEvent(upEvent);
                }, 50);

            } catch (e) {
                console.error("CORS Error: لا يمكن التحكم بالإطار من دومين خارجي مباشرة.");
            }
        }

        // أحداث اللمس للأجهزة المحمولة
        document.getElementById('btn-feed').addEventListener('touchstart', (e) => {
            e.preventDefault();
            sendKey('e', 69);
        });

        document.getElementById('btn-shoot').addEventListener('touchstart', (e) => {
            e.preventDefault();
            sendKey('Enter', 13);
        });

        // دعم الضغط بالماوس للتجربة على الكمبيوتر
        document.getElementById('btn-feed').addEventListener('mousedown', () => sendKey('e', 69));
        document.getElementById('btn-shoot').addEventListener('mousedown', () => sendKey('Enter', 13));
    </script>
</body>
</html>
