<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fawakih AI - الاشتراك</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1A237E, #3949AB);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        h1 { margin-bottom: 10px; font-size: 28px; }
        p { margin-bottom: 30px; font-size: 14px; color: #E8EAF6; }
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: none;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
            text-align: center;
            outline: none;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #FF9800;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background-color: #F57C00; }
        .footer { margin-top: 20px; font-size: 12px; color: #C5CAE9; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>Fawakih AI 🤖</h1>
        <p>الرجاء إدخال مفتاح الاشتراك للوصول إلى النظام الذكي</p>
        
        <input type="text" id="subKey" placeholder="أدخل كود الاشتراك هنا...">
        <button onclick="login()">تسجيل الدخول</button>

        <div class="footer">
            © جميع الحقوق محفوظة لـ Hamza Alhumada
        </div>
    </div>

    <script>
        function login() {
            const key = document.getElementById('subKey').value.trim();
            if (key.length > 3) {
                // محاكاة تفعيل الاشتراك وحفظه في الجلسة
                localStorage.setItem("FawakihaSecure2026X", "active");
                window.location.href = "game.html"; // التوجيه لصفحة اللعب
            } else {
                alert("الرجاء إدخال مفتاح اشتراك صحيح!");
            }
        }

        // التحقق مما إذا كان مسجلاً مسبقاً
        if(localStorage.getItem("FawakihaSecure2026X") === "active") {
            window.location.href = "game.html";
        }
    </script>

</body>
</html>
