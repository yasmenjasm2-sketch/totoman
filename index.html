<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FawakihAI - Yalla Live | التخمين الذكي بالمكتبة</title>
    <!-- Google Fonts & Firebase -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0f1c, #03060c);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* الشاشتان: تبديل سلس بالـ transform */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: transform 0.45s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            overflow-y: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
        }

        #screen1 {
            transform: translateX(0%);
            z-index: 10;
        }

        #screen2 {
            transform: translateX(100%);
            z-index: 5;
        }

        body.swipe-left #screen1 {
            transform: translateX(-100%);
        }
        body.swipe-left #screen2 {
            transform: translateX(0%);
        }

        body.swipe-right #screen1 {
            transform: translateX(0%);
        }
        body.swipe-right #screen2 {
            transform: translateX(100%);
        }

        /* بطاقات الفاكهة */
        .fruit-card {
            background: rgba(20, 28, 40, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 20px;
            text-align: center;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 193, 7, 0.3);
            box-shadow: 0 12px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .glass-panel {
            background: rgba(15, 22, 36, 0.8);
            backdrop-filter: blur(14px);
            border-radius: 32px;
            padding: 25px 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
        }

        .header-ai {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            background: rgba(0,0,0,0.4);
            border-radius: 60px;
            padding: 8px 20px;
        }

        .memory-badge {
            background: #1e2a47;
            padding: 6px 15px;
            border-radius: 25px;
            font-size: 13px;
            font-weight: bold;
            color: #90ffb0;
            border-right: 3px solid #00e676;
        }

        .timer-digit {
            font-size: 58px;
            font-weight: 900;
            text-align: center;
            font-family: monospace;
            background: linear-gradient(135deg, #ffb347, #ffdd77);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 8px #ffb34755;
            margin: 10px 0;
        }

        .fruit-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin: 25px 0;
        }

        .fruit-item {
            background: #0f1422;
            border-radius: 20px;
            padding: 18px 5px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #2a3348;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
            text-align: center;
        }

        .fruit-active {
            background: linear-gradient(145deg, #ffb347, #ff9100);
            border-color: #ffdd88;
            transform: scale(1.05);
            box-shadow: 0 0 18px rgba(255, 180, 40, 0.7);
            color: #000;
        }

        .input-fruit {
            width: 100%;
            padding: 16px;
            background: #0a0f1a;
            border: 1px solid #2c3e66;
            border-radius: 60px;
            color: white;
            font-size: 16px;
            text-align: center;
            margin: 15px 0;
            font-family: 'Cairo', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(90deg, #2979ff, #1565c0);
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            font-size: 18px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 12px #1565c080;
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid #f44336;
            color: #ff7a5c;
            margin-top: 12px;
            box-shadow: none;
        }

        .ai-talk-bubble {
            background: #101826dd;
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 18px;
            border-right: 4px solid #ffb347;
            font-size: 14px;
            display: none;
        }

        .chat-ai-header {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 10px;
            color: #ffc857;
        }

        .telegram-banner {
            position: fixed;
            bottom: 30px;
            left: -100%;
            background: #0088ccdd;
            backdrop-filter: blur(8px);
            padding: 12px 20px;
            border-radius: 0 40px 40px 0;
            font-weight: bold;
            transition: 0.35s;
            z-index: 999;
            font-size: 14px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000cc;
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-box {
            background: #121a2c;
            border-radius: 32px;
            max-width: 340px;
            text-align: center;
            padding: 20px;
            border: 1px solid #ffb347;
        }

        button:active { transform: scale(0.97); }
        .fruit-item:active { transform: scale(0.96); }
    </style>
</head>
<body>

    <!-- شاشة 1: تسجيل الدخول والاشتراك -->
    <div id="screen1" class="screen">
        <div class="fruit-card" style="max-width: 380px;">
            <div style="font-size: 45px; margin-bottom: 8px;">🍍 Fawakih<span style="color:#00e676;">AI</span></div>
            <div style="font-size: 13px; color: #aab; margin-bottom: 28px;">نظام تخمين ذكي | مكتبة المحادثة الاصطناعية</div>
            <input type="text" id="loginUsername" placeholder="👤 اسم المستخدم" class="input-fruit" style="margin:8px 0;">
            <input type="text" id="loginAccessKey" placeholder="🔐 رمز الاشتراك" class="input-fruit" style="margin:8px 0;">
            <button id="doLoginBtn" class="btn-primary">🚀 تفعيل الجلسة</button>
            <div id="loginFeedback" style="margin-top: 16px; font-size: 13px; color: #ffaa66;"></div>
            <div style="margin-top: 20px; font-size: 11px; color:#2c3e66;">📡 قاعدة بيانات لتعلم الفواكه & حماية كاملة</div>
        </div>
    </div>

    <!-- شاشة 2: اللعبة + المحادثة الذكية + تخمين الفاكهة -->
    <div id="screen2" class="screen">
        <div style="width: 100%; max-width: 540px; padding: 20px;">
            <div class="glass-panel">
                <div class="header-ai">
                    <span id="memoryState" class="memory-badge">🧠 العقل 1 | نشط</span>
                    <span id="devInfo" style="font-size:12px; background:#00000055; padding:4px 12px; border-radius:30px;">Yalla v3</span>
                </div>

                <!-- منطقة المحادثة الذكية (المكتبة) -->
                <div id="aiTalkContainer" class="ai-talk-bubble">
                    <div class="chat-ai-header">
                        <span>🤖 المساعد المعرفي (Yalla Library)</span>
                        <span style="font-size:10px; background:#2979ff; border-radius:20px; padding:2px 8px;">AI Live</span>
                    </div>
                    <p id="aiMessageText">مرحباً! أنا مكتبة الذكاء الاصطناعي، أراقب تخميناتك وأساعدك عند الحاجة.</p>
                </div>

                <!-- عداد الجولة و الشكل المربع للفاكهة المستهدفة -->
                <div style="background:#03060c80; border-radius: 28px; padding: 15px; margin: 15px 0;">
                    <div style="font-size: 14px; color:#bbccff;">⏳ وقت التخمين (ثانية)</div>
                    <div id="roundTimer" class="timer-digit">00</div>
                    <div style="font-size: 22px; font-weight: bold; text-align:center; margin-top:5px;">🍎 🍊 🍇</div>
                </div>

                <!-- شبكة الفواكه الأربعة الأساسية (4 خانات) -->
                <div class="fruit-grid" id="fruitsQuadGrid">
                    <!-- سيتم إنشاؤها بواسطة js بناءً على 4 فواكه متغيرة -->
                </div>

                <input type="text" id="userGuessInput" placeholder="✍️ اكتب اسم الفاكهة هنا..." class="input-fruit" autocomplete="off">
                <button id="submitGuessBtn" class="btn-primary">✨ تخمين الفاكهة ✨</button>
                <button id="forceNewRoundBtn" class="btn-primary" style="background: #2c3e66; margin-top: 10px;">🔄 بدء جولة جديدة (تحليل AI)</button>
                <button id="endSessionBtn" class="btn-outline btn-primary" style="margin-top: 14px;">🚪 إنهاء الجلسة & تسجيل الخروج</button>
            </div>
        </div>
    </div>

    <div id="telegramBanner" class="telegram-banner">📢 تنبيه من البوت</div>
    <div id="globalModal" class="modal-overlay"><div class="modal-box"><p id="modalMsgText"></p><button onclick="closeModal()" style="margin-top:16px; background:#2979ff; padding:8px 30px; border-radius:40px;">حسناً</button></div></div>

    <script>
        // ---------------------- قاعدة Firebase (معرفات حقيقية) ------------------
        const firebaseConfig = {
            apiKey: "AIzaSyApqVwnKmq0gJ7k-UM-jLNxaYlBPkRx1Go",
            authDomain: "chatlive-4387e.firebaseapp.com",
            databaseURL: "https://chatlive-4387e-default-rtdb.firebaseio.com",
            projectId: "chatlive-4387e",
            storageBucket: "chatlive-4387e.firebasestorage.app",
            messagingSenderId: "722728428486",
            appId: "1:722728428486:android:847b11a7743dfb7d5ac8c7"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // متغيرات الجلسة
        let currentUser = null;
        let sessionValid = false;
        let activeBrain = 1;              // العقل 1 أو 2
        let wrongStreak = 0;
        let currentTargetFruit = "";      // الفاكهة الصحيحة الحالية (يتم توليدها عشوائيًا من المجموعة)
        let guessAttempts = 0;
        let roundActive = false;
        let timerInterval = null;
        let remainingSeconds = 0;

        // سجلات التخمين للتعلم (ذاكرة العقلين)
        let brain1History = [];   // تخزين آخر 10 فواكه تم إدخالها كصحيحة
        let brain2History = [];
        let brain1Occurrence = {};
        let brain2Occurrence = {};

        // قائمة الفواكه الأساسية (المكتبة)
        const MASTER_FRUITS = ["عنب", "ليمون", "برتقال", "تفاح", "كرز", "بطيخ", "فراولة", "مانجو"];
        const FRUIT_EMOJI = { "عنب":"🍇","ليمون":"🍋","برتقال":"🍊","تفاح":"🍎","كرز":"🍒","بطيخ":"🍉","فراولة":"🍓","مانجو":"🥭" };

        // المتغيرات الخاصة بالتخمين والعرض
        let currentFourFruits = [];   // 4 فواكه معروضة للتخمين (مرتبة حسب التوقعات)
        let roundPredictionFruits = [];

        // المحادثة الذكية (مكتبة AI)
        const aiLibraryMessages = [
            "أهلاً! أنا ذكاء اصطناعي متخصص بتعلم نمط الفواكه. اذا تكرر خطؤك 3 مرات سأنصحك شخصياً.",
            "لاحظت أنك تواجه صعوبة. الفواكه المتوقعة بناءً على آخر 3 جولات: {fruitList}",
            "استشرني مباشرة: يمكنني تقديم 4 فواكه سابقة من قاعدة التسجيلات وتحليل سلوكك.",
            "الرجاء التركيز! التخمين الخاطئ المتكرر يحولك إلى محادثة مساعدة. إليك قائمة بالفواكه السابقة: {historyList}",
            "🧠 تعلُم الذكاء تم تحديثه. الجولة القادمة ستكون أكثر دقة بناءً على مدخلات المستخدمين السابقة."
        ];

        // دوال مساعدة
        function showModal(msg) {
            const modal = document.getElementById('globalModal');
            document.getElementById('modalMsgText').innerText = msg;
            modal.style.display = 'flex';
        }
        function closeModal() { document.getElementById('globalModal').style.display = 'none'; }

        // حفظ الذاكرة في localStorage + تحديث واجهة العقل
        function persistMemory() {
            const memoryData = {
                brain1History, brain2History, brain1Occurrence, brain2Occurrence, activeBrain, wrongStreak
            };
            localStorage.setItem("FawakihAIMemory", JSON.stringify(memoryData));
            updateMemoryUI();
        }

        function updateMemoryUI() {
            const memSpan = document.getElementById('memoryState');
            if(memSpan) memSpan.innerHTML = `🧠 العقل ${activeBrain} | ${wrongStreak>=3 ? '⚠️ استشارة' : 'نشط'}`;
        }

        function loadMemory() {
            const saved = localStorage.getItem("FawakihAIMemory");
            if(saved) {
                try {
                    const data = JSON.parse(saved);
                    brain1History = data.brain1History || [];
                    brain2History = data.brain2History || [];
                    brain1Occurrence = data.brain1Occurrence || {};
                    brain2Occurrence = data.brain2Occurrence || {};
                    activeBrain = data.activeBrain || 1;
                    wrongStreak = data.wrongStreak || 0;
                } catch(e) {}
            }
            updateMemoryUI();
        }

        // إضافة فاكهة صحيحة للذاكرة (بعد تخمين صحيح)
        function addCorrectFruitToMemory(fruit) {
            if(!fruit) return;
            const targetHistory = (activeBrain === 1) ? brain1History : brain2History;
            const targetOcc = (activeBrain === 1) ? brain1Occurrence : brain2Occurrence;

            targetHistory.push(fruit);
            targetOcc[fruit] = (targetOcc[fruit] || 0) + 1;

            if(targetHistory.length > 10) {
                const removed = targetHistory.shift();
                if(targetOcc[removed] > 1) targetOcc[removed]--;
                else delete targetOcc[removed];
            }

            // تحديث الذاكرة البينية وحفظها
            if(activeBrain === 1) { brain1History = targetHistory; brain1Occurrence = targetOcc; }
            else { brain2History = targetHistory; brain2Occurrence = targetOcc; }
            persistMemory();
        }

        // تبديل العقل بعد 3 أخطاء متتالية
        function handleWrongGuess() {
            wrongStreak++;
            if(wrongStreak >= 3) {
                const oldBrain = activeBrain;
                activeBrain = (activeBrain === 1) ? 2 : 1;
                wrongStreak = 0;
                persistMemory();
                // عرض محادثة ذكاء اصطناعي: "روح تحادث مع الذكاء الاصطناعي بمشكلتك"
                showAIConsultation(`⚠️ تم تحويلك للعقل ${activeBrain} بسبب الأخطاء المتكررة. المكتبة الذكية تقدم لك حل: حاول تخمين الفواكه الأكثر شيوعاً خلال آخر جولات: ${getTopFruitsFromMemory().join(' - ')}`);
                // أيضا توجيهه بضرورة مراجعة المحادثة.
                showModal(`🔁 تم تبديل العقل إلى العقل ${activeBrain}. يمكنك الآن استشارة الذكاء الاصطناعي أعلى الشاشة لحل مشكلتك.`);
            } else {
                updateMemoryUI();
            }
        }

        // الحصول على أكثر 4 فواكه توقعاً من الذاكرة
        function getTopFruitsFromMemory() {
            const occ = (activeBrain === 1) ? brain1Occurrence : brain2Occurrence;
            let entries = Object.entries(occ);
            entries.sort((a,b)=>b[1]-a[1]);
            let top = entries.slice(0,4).map(e=>e[0]);
            if(top.length<4) {
                let missing = MASTER_FRUITS.filter(f=>!top.includes(f));
                top.push(...missing.slice(0,4-top.length));
            }
            return top.slice(0,4);
        }

        // عرض رسالة AI في فقاعة المحادثة
        function showAIConsultation(message) {
            const container = document.getElementById('aiTalkContainer');
            const msgP = document.getElementById('aiMessageText');
            if(container && msgP) {
                msgP.innerText = message;
                container.style.display = 'block';
                setTimeout(() => {
                    if(container) container.style.display = 'none';
                }, 6000);
            }
        }

        // توليد 4 فواكه للتخمين بناءً على توقعات الذكاء الاصطناعي
        function generatePredictionFruits() {
            let predicted = getTopFruitsFromMemory();
            // خلط عشوائي بسيط ولكن نضيف بعض العشوائية الواقعية
            for(let i=predicted.length-1;i>0;i--){
                const j=Math.floor(Math.random()*(i+1));
                [predicted[i],predicted[j]]=[predicted[j],predicted[i]];
            }
            return predicted.slice(0,4);
        }

        // بدء جولة جديدة: اختيار الفاكهة الصحيحة random من MASTER_FRUITS
        function startNewRound() {
            if(!sessionValid) return;
            if(timerInterval) clearInterval(timerInterval);
            // اختيار فاكهة مستهدفة عشوائية من المكتبة الكاملة
            const randomIndex = Math.floor(Math.random() * MASTER_FRUITS.length);
            currentTargetFruit = MASTER_FRUITS[randomIndex];
            // تحديث توقعات الـ 4 خانات بناءً على الذاكرة
            roundPredictionFruits = generatePredictionFruits();
            currentFourFruits = [...roundPredictionFruits];
            // تحديث الواجهة: رسم 4 خانات
            renderFruitsGrid(currentFourFruits);
            // إعادة ضبط متغيرات الجولة
            guessAttempts = 0;
            roundActive = true;
            remainingSeconds = 25 + Math.floor(Math.random() * 11); // 25-35 ثانية
            document.getElementById('roundTimer').innerText = remainingSeconds;
            // بدء العداد
            timerInterval = setInterval(() => {
                if(!roundActive) return;
                if(remainingSeconds <= 1) {
                    clearInterval(timerInterval);
                    document.getElementById('roundTimer').innerText = "00";
                    roundActive = false;
                    showModal("⏰ انتهى الوقت! لم يتم التخمين، ستبدأ جولة جديدة.");
                    startNewRound();
                } else {
                    remainingSeconds--;
                    document.getElementById('roundTimer').innerText = remainingSeconds;
                }
            }, 1000);
            // إخفاء فقاعة المحادثة بشكل دوري ولكن قد تظهر تلقائياً إذا احتاج المستخدم
            const aiDiv = document.getElementById('aiTalkContainer');
            if(aiDiv) aiDiv.style.display = 'none';
        }

        function renderFruitsGrid(fruitsArray) {
            const grid = document.getElementById('fruitsQuadGrid');
            if(!grid) return;
            grid.innerHTML = '';
            fruitsArray.forEach(fruit => {
                const emoji = FRUIT_EMOJI[fruit] || "🍎";
                const div = document.createElement('div');
                div.className = 'fruit-item';
                div.innerHTML = `${emoji} ${fruit}`;
                div.onclick = () => {
                    document.getElementById('userGuessInput').value = fruit;
                };
                grid.appendChild(div);
            });
        }

        // معالجة التخمين
        function handleGuess() {
            if(!sessionValid) { showModal("الرجاء تسجيل الدخول أولاً"); return; }
            if(!roundActive) { showModal("الجولة غير نشطة، ابدأ جولة جديدة بالزر"); return; }
            const guessInput = document.getElementById('userGuessInput').value.trim();
            if(guessInput === "") { showModal("أدخل اسم الفاكهة من القائمة المعروضة"); return; }
            // تطبيع الإدخال
            let normalizedGuess = guessInput;
            if(guessInput === "فراوله") normalizedGuess = "فراولة";
            if(!MASTER_FRUITS.includes(normalizedGuess)) {
                showModal(`❌ خطأ: "${guessInput}" ليست فاكهة معتمدة في المكتبة. استخدم: ${MASTER_FRUITS.join(', ')}`);
                return;
            }
            if(normalizedGuess === currentTargetFruit) {
                // تخمين صحيح
                clearInterval(timerInterval);
                roundActive = false;
                showModal(`🎉 تهانينا! الإجابة صحيحة ✅ الفاكهة هي ${currentTargetFruit} ${FRUIT_EMOJI[currentTargetFruit] || ''}`);
                addCorrectFruitToMemory(currentTargetFruit);
                wrongStreak = 0;
                persistMemory();
                // بعد التخمين الصحيح، تبدأ جولة جديدة بعد 1.5 ثانية
                setTimeout(() => { startNewRound(); }, 1500);
                document.getElementById('userGuessInput').value = '';
            } else {
                // تخمين خاطئ
                guessAttempts++;
                const remainingAttempts = 3 - guessAttempts;
                showModal(`❌ خاطئ! الفاكهة ليست ${normalizedGuess}. متبقي ${remainingAttempts} محاولات قبل استشارة الذكاء.`);
                if(guessAttempts >= 3) {
                    // بعد 3 محاولات خاطئة في نفس الجولة -> استشارة الذكاء الاصطناعي وإظهار 4 فواكه سابقة
                    clearInterval(timerInterval);
                    roundActive = false;
                    // إظهار محادثة احترافية: اقتراح 4 فواكه جاءت سابقاً وحل المشكلة
                    const lastFourFromHistory = (activeBrain === 1 ? brain1History : brain2History).slice(-4);
                    const suggestions = (lastFourFromHistory.length ? lastFourFromHistory : MASTER_FRUITS.slice(0,4)).join("، ");
                    const advisoryMsg = `🧠 تم استنفاذ المحاولات. يوجهك الذكاء الاصطناعي: مشكلتك تكمن في التخمين دون تحليل النمط. إليك 4 فواكه كانت صحيحة سابقاً: ${suggestions}. تواصل معي لتحليل أفضل!`;
                    showAIConsultation(advisoryMsg);
                    showModal(`⚠️ 3 محاولات خاطئة. توجه إلى مربع المحادثة الذكية بالأعلى، لقد أعطيتك الحل. سيتم بدء جولة جديدة بعد تعلم الفواكه السابقة.`);
                    // إضافة الفاكهة الخاطئة كبيانات تعلم ولكن تسجيل عداد خطأ للعقل
                    handleWrongGuess();
                    // حفظ محاولة فاشلة للتعلّم
                    const occCurrent = (activeBrain === 1) ? brain1Occurrence : brain2Occurrence;
                    if(occCurrent[normalizedGuess]) occCurrent[normalizedGuess] = Math.max(0, occCurrent[normalizedGuess]-0.5);
                    persistMemory();
                    setTimeout(() => { startNewRound(); }, 2800);
                }
                document.getElementById('userGuessInput').value = '';
            }
        }

        // إنهاء الجلسة والخروج لشاشة الاشتراك
        function logoutAndExit() {
            if(timerInterval) clearInterval(timerInterval);
            sessionValid = false;
            currentUser = null;
            localStorage.removeItem("FawakihSession");
            // تبديل الشاشة بشكل سلس لليمين (شاشة الاشتراك)
            document.body.classList.remove('swipe-left');
            document.body.classList.add('swipe-right');
            setTimeout(() => {
                location.reload(); // اعادة تحميل للتأكد من الرجوع لتسجيل الدخول
            }, 200);
        }

        // === نظام التبديل بين الشاشتين عن طريق السحب (touch) ===
        let touchStartX = 0;
        document.body.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; });
        document.body.addEventListener('touchend', (e) => {
            if(!sessionValid) return;
            const endX = e.changedTouches[0].screenX;
            const diff = endX - touchStartX;
            if(Math.abs(diff) > 60) {
                if(diff > 0) {
                    // مسح لليمين -> العودة لشاشة الاشتراك (تسجيل خروج تلقائي؟ نعم لإنهاء الجلسة)
                    logoutAndExit();
                } else {
                    // مسح لليسار: التبديل بين الشاشة 2 (نحن بالفعل داخل screen2 لكن التصميم يسمح فقط بتبديل احترافي)
                    // لا داعي، الشاشتان مثبتتان لكن يوفر ترحيلاً سلساً بين الـ AI و Library عملياً
                    showModal("✨ أنت في شاشة التخمين، يمكنك التحدث مع الذكاء عبر النص.");
                }
            }
        });

        // عملية تسجيل الدخول عبر Firebase
        function performLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const accessKey = document.getElementById('loginAccessKey').value.trim();
            const feedback = document.getElementById('loginFeedback');
            if(!username || !accessKey) { feedback.innerText = "املأ الحقول"; return; }
            feedback.innerText = "جاري التحقق ...";
            database.ref('System/Codes/' + accessKey).once('value').then(snap => {
                if(snap.exists() && snap.val().isActive === true) {
                    const expiryTime = Date.now() + (30*24*60*60*1000);
                    database.ref('System/Codes/' + accessKey).update({ isActive: false, usedBy: username });
                    database.ref('System/Users/' + username).set({ codeUsed: accessKey, expiryTime: expiryTime, status: "نشط" });
                    localStorage.setItem("FawakihSession", username);
                    currentUser = username;
                    sessionValid = true;
                    feedback.innerText = "✅ تم التفعيل! جارِ الانتقال للعبة.";
                    // تبديل سلس لشاشة اللعبة (تحريك شاشة لليسار)
                    document.body.classList.remove('swipe-right');
                    document.body.classList.add('swipe-left');
                    loadMemory();
                    startNewRound();
                } else {
                    database.ref('System/Users/' + username).once('value').then(userSnap => {
                        if(userSnap.exists() && userSnap.val().expiryTime > Date.now() && userSnap.val().codeUsed === accessKey) {
                            localStorage.setItem("FawakihSession", username);
                            currentUser = username;
                            sessionValid = true;
                            document.body.classList.add('swipe-left');
                            loadMemory();
                            startNewRound();
                        } else {
                            feedback.innerText = "رمز الوصول غير صالح أو منتهي.";
                        }
                    });
                }
            }).catch(() => { feedback.innerText = "خطأ في قاعدة البيانات"; });
        }

        // ربط الأحداث
        window.onload = () => {
            document.getElementById('doLoginBtn').addEventListener('click', performLogin);
            document.getElementById('submitGuessBtn').addEventListener('click', handleGuess);
            document.getElementById('forceNewRoundBtn').addEventListener('click', () => { if(sessionValid){ if(timerInterval)clearInterval(timerInterval); startNewRound(); } });
            document.getElementById('endSessionBtn').addEventListener('click', logoutAndExit);
            const savedSession = localStorage.getItem("FawakihSession");
            if(savedSession) {
                database.ref('System/Users/' + savedSession).once('value').then(snap => {
                    if(snap.exists() && snap.val().expiryTime > Date.now()) {
                        currentUser = savedSession;
                        sessionValid = true;
                        document.body.classList.add('swipe-left');
                        loadMemory();
                        startNewRound();
                    } else { localStorage.removeItem("FawakihSession"); }
                });
            }
            // منع الكليك الأيمن والاختصارات
            document.oncontextmenu = (e) => e.preventDefault();
        };
    </script>
</body>
</html>
