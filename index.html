<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>🔴 Delt.io - Remas</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
            
            /* منع النسخ وتحديد النصوص لأجهزة الآيفون */
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            
            /* منع السحب المطاطي (البونس) الذي يظهر شريط البحث */
            overscroll-behavior-y: none;
            position: fixed;
        }
        
        /* إعدادات مشتركة للإطارات */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            margin: 0;
            padding: 0;
            display: block;
        }

        /* إطار اللعبة الأصلية */
        #game-frame {
            z-index: 1; 
            pointer-events: auto;
        }

        /* إطار صفحة الفانز (مخفي في البداية) */
        #fans-frame {
            z-index: 2;
            visibility: hidden; 
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease; 
        }

        /* تنسيق موحد للأزرار */
        .action-btn {
            position: fixed;
            right: 20px;
            padding: 10px 16px;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            z-index: 999999; 
            font-size: 16px;
            font-family: sans-serif;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: 0.2s;
        }

        /* زر بيتا 2 (في المنتصف) */
        #btn-beta { 
            top: 50%; 
            transform: translateY(-50%); 
            background: #222; 
        }

        /* زر الفانز (مخفي، ويظهر مكان بيتا لاحقاً) */
        #btn-fans {
            top: 50%; 
            transform: translateY(-50%);
            background: #ff4757; 
            display: none; 
        }

        #btn-fans:hover {
            transform: translateY(-50%) scale(1.05);
        }

        /* زر WSS (مرفوع قليلاً حتى لا يتداخل مع الأزرار الأخرى) */
        #btn-wss {
            top: calc(50% - 55px);
            transform: translateY(-50%);
            background: #007bff;
            display: none; 
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999999;
            font-family: sans-serif;
            text-align: center;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #fff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <button id="btn-beta" class="action-btn">دخول beta 2</button>
    <button id="btn-wss" class="action-btn">WSS</button>
    <button id="btn-fans" class="action-btn">Fans</button>

    <div id="loading-screen">
        <div class="spinner"></div>
        <h2>يرجى الانتظار</h2>
        <p>للمعلومية ريماس قامت بتطويرها لكم 🌷</p>
    </div>

    <iframe id="game-frame" src="https://delt.io/" allowfullscreen="true"></iframe>
    
    <iframe id="fans-frame" src="https://yasmenjasm2-sketch.github.io/totoman/" allowfullscreen="true"></iframe>

    <script>
        const btnBeta = document.getElementById("btn-beta");
        const btnWss = document.getElementById("btn-wss");
        const btnFans = document.getElementById("btn-fans"); 
        const loadingScreen = document.getElementById("loading-screen");
        const fansFrame = document.getElementById("fans-frame");
        
        let lastWSS = "";
        let isAwake = false;
        let isFansVisible = false; 

        // دالة لمنع المتصفح من إدخال الصفحة في وضع النوم
        function keepPageAwake() {
            if (isAwake) return;
            isAwake = true;

            const silentAudio = new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA");
            silentAudio.loop = true;
            silentAudio.play().catch(e => console.log("الصوت الصامت ينتظر تفاعل المستخدم"));

            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen').catch(err => console.log("Wake Lock Error:", err));
            }
        }

        document.addEventListener("click", keepPageAwake, { once: true });
        document.addEventListener("keydown", keepPageAwake, { once: true });

        const OriginalWebSocket = window.WebSocket;
        window.WebSocket = function(url, protocols) {
            if (url.includes('wss://')) {
                lastWSS = url;
            }
            return new OriginalWebSocket(url, protocols);
        };

        // برمجة زر Beta 2
        btnBeta.addEventListener("click", () => {
            keepPageAwake(); 

            try {
                const docElm = document.documentElement;
                if (docElm.requestFullscreen) {
                    docElm.requestFullscreen().then(() => {
                        if (screen.orientation && screen.orientation.lock) {
                            screen.orientation.lock("landscape").catch(e => console.log("توجيه الشاشة غير مدعوم:", e));
                        }
                    }).catch(e => console.log(e));
                }
            } catch (e) {
                console.log("خطأ في ملء الشاشة:", e);
            }

            loadingScreen.style.display = "flex";
            // إخفاء زر بيتا فور الضغط عليه
            btnBeta.style.display = "none";
            
            setTimeout(() => {
                loadingScreen.style.display = "none";
                btnWss.style.display = "block";
                // إظهار زر الفانز ليأخذ مكان زر بيتا
                btnFans.style.display = "block";
            }, 3000);
        });

        // برمجة زر WSS
        btnWss.addEventListener("click", () => {
            keepPageAwake();
            if (lastWSS) {
                navigator.clipboard.writeText(lastWSS).then(() => {
                    alert("تم نسخ: " + lastWSS);
                }).catch(() => {
                    const tempInput = document.createElement("input");
                    tempInput.value = lastWSS;
                    document.body.appendChild(tempInput);
                    tempInput.select();
                    document.execCommand("copy");
                    document.body.removeChild(tempInput);
                    alert("تم نسخ: " + lastWSS);
                });
            } else {
                alert("لم يتم العثور على WSS بعد، انتظر تحميل اللعبة قليلاً.");
            }
        });

        // برمجة زر Fans للتبديل بين اللعبة وصفحة الفانز
        btnFans.addEventListener("click", () => {
            keepPageAwake(); 
            isFansVisible = !isFansVisible; 

            if (isFansVisible) {
                // إظهار صفحة الفانز
                fansFrame.style.visibility = "visible";
                fansFrame.style.opacity = "1";
                fansFrame.style.pointerEvents = "auto";
                
                // تغيير شكل الزر ليدل على إمكانية العودة للعبة
                btnFans.innerText = "العودة للعبة";
                btnFans.style.background = "#2ed573"; 
            } else {
                // إخفاء صفحة الفانز والعودة للعبة
                fansFrame.style.visibility = "hidden";
                fansFrame.style.opacity = "0";
                fansFrame.style.pointerEvents = "none";
                
                // إرجاع شكل الزر للأصلي
                btnFans.innerText = "Fans";
                btnFans.style.background = "#ff4757"; 
            }
        });

        // اختصار كيبورد (زر Tab) للتبديل السريع
        document.addEventListener("keydown", (e) => {
            if (e.code === "Tab") {
                e.preventDefault(); 
                btnFans.click(); 
            }
        });

    </script>
</body>
</html>
