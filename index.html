<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remas Scripts - Mobile Edition</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #00f2fe;
            --accent: #ff416c;
            --bg-dark: #050b14;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 0%, #1a2542 0%, var(--bg-dark) 70%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
        }

        /* الهيدر */
        .header {
            text-align: center; margin-bottom: 30px; padding-top: 20px;
        }
        .header h1 {
            font-size: 28px; letter-spacing: 2px; color: #fff;
            text-shadow: 0 0 15px var(--primary);
        }
        .header p { color: var(--primary); font-size: 14px; margin-top: 5px; opacity: 0.8; }

        /* زر اللعب الكبير */
        .play-btn {
            display: flex; align-items: center; justify-content: center; gap: 15px;
            background: linear-gradient(45deg, var(--primary), #4facfe);
            color: #000; padding: 18px; border-radius: 15px;
            text-decoration: none; font-weight: bold; font-size: 18px;
            margin-bottom: 30px; box-shadow: 0 10px 20px rgba(0, 242, 254, 0.3);
            transition: 0.3s;
        }
        .play-btn:active { transform: scale(0.95); }

        /* شبكة الملفات */
        .scripts-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
        }

        .file-card {
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 20px; display: flex; flex-direction: column;
            align-items: center; text-align: center; backdrop-filter: blur(10px);
            transition: 0.3s; cursor: pointer;
        }
        .file-card:active { background: rgba(0, 242, 254, 0.1); border-color: var(--primary); }
        
        .file-icon { font-size: 40px; color: var(--primary); margin-bottom: 10px; }
        .file-name { font-size: 14px; font-weight: 500; }

        /* نافذة العرض (Modal) */
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 100; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content {
            background: #101525; border: 1px solid var(--primary); border-radius: 20px;
            width: 100%; max-width: 500px; padding: 20px; position: relative;
        }
        textarea {
            width: 100%; height: 250px; background: #000; color: var(--primary);
            border: 1px solid #333; border-radius: 10px; padding: 15px;
            font-family: monospace; font-size: 13px; margin: 15px 0; resize: none;
            direction: ltr; text-align: left;
        }
        .copy-btn {
            width: 100%; padding: 15px; background: var(--primary); border: none;
            border-radius: 10px; font-weight: bold; cursor: pointer;
        }
        .close-modal {
            position: absolute; top: -40px; right: 0; color: #fff; font-size: 24px;
        }

        /* حماية: إخفاء أيقونة التعديل تماماً عن الزوار */
        .admin-only { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>REMAS SCRIPTS</h1>
        <p><i class="fas fa-bolt"></i> أفضل سكربتات senpa.io للهاتف</p>
    </div>

    <a href="mobile.html" class="play-btn">
        <i class="fas fa-gamepad"></i> العب senpa.io بالماكرو
    </a>

    <div class="scripts-grid" id="scripts-container">
        </div>

    <div class="modal" id="script-modal">
        <div class="modal-content">
            <i class="fas fa-times close-modal" onclick="closeModal()"></i>
            <h3 id="modal-title" style="color:white;">تحميل السكربت...</h3>
            <textarea id="script-text" readonly></textarea>
            <button class="copy-btn" onclick="copyScript()"><i class="fas fa-copy"></i> نسخ الكود</button>
        </div>
    </div>

    <script>
        // إعدادات فايربيس الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyApqVwnKmq0gJ7k-UM-jLNxaYlBPkRx1Go",
            authDomain: "chatlive-4387e.firebaseapp.com",
            databaseURL: "https://chatlive-4387e-default-rtdb.firebaseio.com",
            projectId: "chatlive-4387e",
            storageBucket: "chatlive-4387e.firebasestorage.app",
            messagingSenderId: "722728428486",
            appId: "1:722728428486:android:847b11a7743dfb7d5ac8c7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // إنشاء المربعات الأربعة
        function initUI() {
            const container = document.getElementById('scripts-container');
            for (let i = 1; i <= 4; i++) {
                container.innerHTML += `
                    <div class="file-card" onclick="openScript(${i})">
                        <i class="fas fa-file-code file-icon"></i>
                        <div class="file-name">Script Slot ${i}</div>
                        <span style="font-size:10px; color:#555; margin-top:5px;">بواسطة ريماس</span>
                    </div>
                `;
            }
        }

        // فتح السكربت (قراءة فقط)
        function openScript(id) {
            const modal = document.getElementById('script-modal');
            const textarea = document.getElementById('script-text');
            const title = document.getElementById('modal-title');
            
            modal.style.display = 'flex';
            title.innerText = "Script Slot " + id;
            textarea.value = "جاري تحميل الكود...";

            db.ref('senpa_scripts/slot_' + id).once('value').then((snapshot) => {
                const data = snapshot.val();
                textarea.value = (data && data.content) ? data.content : "// لا يوجد سكربت متاح حالياً في هذا القسم.";
            });
        }

        function closeModal() {
            document.getElementById('script-modal').style.display = 'none';
        }

        function copyScript() {
            const text = document.getElementById('script-text');
            text.select();
            document.execCommand('copy');
            
            const btn = document.querySelector('.copy-btn');
            btn.innerHTML = '<i class="fas fa-check"></i> تم النسخ!';
            btn.style.background = '#22c55e';
            setTimeout(() => {
                btn.innerHTML = '<i class="fas fa-copy"></i> نسخ الكود';
                btn.style.background = 'var(--primary)';
            }, 2000);
        }

        // تتبع الزوار (بوت تليجرام)
        async function track() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                const msg = `📱 زائر جديد للموقع!\n🌐 IP: ${data.ip}\n📍 الدولة: ${data.country_name}`;
                fetch(`https://api.telegram.org/bot7894436976:AAFdg77dpzCgpeLnkwAQqP9POkwZMwWoikg/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ chat_id: "-1003783270855", text: msg })
                });
            } catch(e) {}
        }

        window.onload = () => {
            initUI();
            track();
        };
    </script>
</body>
</html>
