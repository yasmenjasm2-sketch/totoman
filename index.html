<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <!-- تسمية الصفحة الأولى بالعلامة الحمراء -->
    <title>🔴 Delt.io - Remas</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
        }
        
        /* إعداد الإطار ليكون مرناً ولا يمنع اللمس نهائياً */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            margin: 0;
            padding: 0;
            display: block;
            pointer-events: auto;
            z-index: 1; /* اللعبة في الطبقة السفلية */
        }

        #btn-beta, #btn-wss {
            position: fixed;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            padding: 10px 16px;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            z-index: 999999; /* الأزرار في الطبقة العلوية */
            font-size: 16px;
            font-family: sans-serif;
        }

        #btn-beta {
            background: #222;
        }

        #btn-wss {
            background: #007bff;
            display: none; /* مخفي حتى ينتهي التحميل */
        }

        /* تنسيق زر Fans */
        #btn-fans {
            position: fixed;
            top: calc(50% + 55px);
            right: 20px;
            transform: translateY(-50%);
            padding: 10px 16px;
            color: #fff;
            background: #ff4757; 
            border: none;
            border-radius: 8px;
            cursor: pointer;
            z-index: 999999;
            font-size: 16px;
            font-family: sans-serif;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999999;
            font-family: sans-serif;
            text-align: center;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #fff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <button id="btn-beta">دخولbeta 2</button>
    <button id="btn-wss">WSS</button>
    <!-- زر Fans -->
    <button id="btn-fans">Fans</button>

    <div id="loading-screen">
        <div class="spinner"></div>
        <h2>يرجى الانتظار</h2>
        <p>للمعلومية ريماس قامت بتطويرها لكم🌷</p>
    </div>

    <iframe id="game-frame" src="https://delt.io/" allowfullscreen="true"></iframe>

    <script>
        const btnBeta = document.getElementById("btn-beta");
        const btnWss = document.getElementById("btn-wss");
        const loadingScreen = document.getElementById("loading-screen");
        const btnFans = document.getElementById("btn-fans"); 
        
        let lastWSS = "";
        let fansTabWindow = null; 
        let isAwake = false;

        // دالة لمنع المتصفح من إدخال الصفحة في وضع النوم (عن طريق صوت صامت في الخلفية)
        function keepPageAwake() {
            if (isAwake) return;
            isAwake = true;

            // تشغيل مسار صوتي صامت للحفاظ على نشاط الصفحة في الخلفية
            const silentAudio = new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA");
            silentAudio.loop = true;
            silentAudio.play().catch(() => {
                console.log("الصوت الصامت يحتاج إلى تفاعل المستخدم أولاً");
            });

            // تفعيل Wake Lock لمنع قفل الشاشة إذا كان مدعوماً
            if ('wakeLock' in navigator) {
                try {
                    navigator.wakeLock.request('screen');
                } catch (err) {
                    console.log("Wake Lock Error:", err);
                }
            }
        }

        // التقاط أي تفاعل من المستخدم لتفعيل دالة منع النوم
        document.addEventListener("click", keepPageAwake, { once: true });

        // التقاط أي WebSocket يتم فتحه
        const OriginalWebSocket = window.WebSocket;
        window.WebSocket = function(url, protocols) {
            if (url.includes('wss://')) {
                lastWSS = url;
            }
            return new OriginalWebSocket(url, protocols);
        };

        btnBeta.addEventListener("click", () => {
            keepPageAwake(); // تفعيل منع النوم

            try {
                const docElm = document.documentElement;
                if (docElm.requestFullscreen) {
                    docElm.requestFullscreen().then(() => {
                        if (screen.orientation && screen.orientation.lock) {
                            screen.orientation.lock("landscape").catch(e => console.log("توجيه الشاشة غير مدعوم أو مرفوض:", e));
                        }
                    }).catch(e => console.log(e));
                }
            } catch (e) {
                console.log("خطأ في ملء الشاشة:", e);
            }

            loadingScreen.style.display = "flex";
            btnBeta.style.display = "none";
            
            setTimeout(() => {
                loadingScreen.style.display = "none";
                btnWss.style.display = "block";
            }, 3000);
        });

        btnWss.addEventListener("click", () => {
            keepPageAwake(); // تفعيل منع النوم
            if (lastWSS) {
                const tempInput = document.createElement("input");
                tempInput.value = lastWSS;
                document.body.appendChild(tempInput);
                tempInput.select();
                try {
                    document.execCommand("copy");
                    alert("تم نسخ: " + lastWSS);
                } catch (err) {
                    console.error("فشل النسخ", err);
                }
                document.body.removeChild(tempInput);
            } else {
                alert("لم يتم العثور على WSS بعد، انتظر تحميل اللعبة.");
            }
        });

        // برمجة زر Fans المطور
        btnFans.addEventListener("click", () => {
            keepPageAwake(); // تفعيل منع النوم لضمان عدم فصل التبويب الأول

            const urlToOpen = "https://yasmenjasm2-sketch.github.io/totoman/"; 

            if (fansTabWindow && !fansTabWindow.closed) {
                // العودة للتبويب إذا كان مفتوحاً دون تجديده
                fansTabWindow.focus();
            } else {
                // فتح التبويب لأول مرة
                fansTabWindow = window.open(urlToOpen, "RemasFansTab");
                
                // محاولة تغيير اسم التبويب الثاني إلى 🟢 
                // (قد يحجبه المتصفح بسبب أمان المواقع الخارجية، ولكنه مدمج هنا كحل ممكن)
                try {
                    fansTabWindow.onload = function() {
                        fansTabWindow.document.title = "🟢 Fans Page";
                    };
                } catch (e) {}
            }
        });
    </script>
</body>
</html>
