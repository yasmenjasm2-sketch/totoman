<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FawakihAI - النظام الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00E676; --bg: #0b0a1a; --card-bg: rgba(30, 20, 50, 0.95); --accent: #00e5ff; --btn-color: #e000ff; }
        body, html { font-family: 'Cairo', sans-serif; background-color: var(--bg); color: white; margin: 0; padding: 0; width: 100%; height: 100%; overflow-x: hidden; }
        
        /* الرسوم المتحركة للخلفية */
        @keyframes bgPulse { 0% { background-color: #1a1a2e; } 50% { background-color: #16213e; } 100% { background-color: #1a1a2e; } }
        body { animation: bgPulse 5s infinite alternate; }

        /* الشاشات */
        .screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; overflow-y: auto; padding: 20px; box-sizing: border-box; flex-direction: column; align-items: center; }
        .active-screen { display: flex; animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* المكونات العامة */
        .card { background: var(--card-bg); padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); text-align: center; width: 100%; max-width: 400px; border: 1px solid rgba(0, 229, 255, 0.2); }
        .title { color: white; font-size: 24px; font-weight: 900; margin-bottom: 20px; }
        .title span { color: var(--accent); }
        
        .input-style { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5); color: white; font-size: 15px; outline: none; box-sizing: border-box; text-align: center; font-family: 'Cairo', sans-serif; }
        .input-style:focus { border-color: var(--accent); }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 15px; font-family: 'Cairo', sans-serif; transition: transform 0.1s; }
        .btn:active { transform: scale(0.95); }
        .btn-primary { background: linear-gradient(45deg, #FF512F, #F09819); color: white; }
        .btn-success { background: linear-gradient(45deg, #11998e, #38ef7d); color: white; }
        .btn-dark { background: linear-gradient(45deg, #434343, #000000); color: white; border: 1px solid #FFD700; }
        .btn-purple { background: linear-gradient(45deg, var(--btn-color), #b000c7); color: white; }

        /* شاشة اللعبة */
        .top-header { display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 400px; margin-bottom: 10px; }
        .ai-status { color: var(--primary); font-size: 14px; margin-bottom: 20px; font-weight: bold; }
        
        .fruits-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; max-width: 400px; margin-bottom: 30px; }
        .fruit-box { background: rgba(255, 255, 255, 0.05); border-radius: 15px; aspect-ratio: 1 / 1; display: flex; justify-content: center; align-items: center; font-size: 40px; transition: all 0.3s ease; }
        .fruit-active { background: rgba(255, 152, 0, 0.5) !important; box-shadow: 0 0 20px rgba(255, 152, 0, 0.8); transform: scale(1.05); border: 2px solid #FF9800; }
        
        .timer-box { background: #1C2331; border-radius: 50%; color: white; font-size: 30px; font-weight: bold; text-shadow: 0 0 10px var(--accent); display: flex; justify-content: center; align-items: center; }
        
        .expiry-timer { background: #1C2331; padding: 15px; border-radius: 30px; color: white; font-weight: bold; margin-bottom: 20px; text-align: center; }

        /* البانر الإشعاري */
        #telegramBanner { position: fixed; top: 20px; right: -100%; background: linear-gradient(45deg, #1A2980, #26D0CE); padding: 15px 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 9999; transition: right 0.5s cubic-bezier(0.25, 1, 0.5, 1); display: flex; align-items: center; gap: 10px; }
        
        /* نافذة العروض */
        .offers-box { border: 2px solid var(--accent); border-radius: 20px; padding: 15px; margin-top: 20px; background: #1E1E2E; width: 100%; max-width: 400px; }
    </style>
</head>
<body>

    <div id="telegramBanner">
        <span style="font-size: 24px;">🔔</span>
        <span id="telegramBannerText" style="font-weight: bold;"></span>
    </div>

    <div id="loginScreen" class="screen active-screen">
        <div class="card" style="margin-top: 10vh;">
            <div class="title">Fawakih<span>AI</span></div>
            <p style="font-size: 14px; color: #ccc;">قم بتفعيل الاشتراك للمتابعة</p>
            <input type="text" id="subCode" class="input-style" placeholder="🔑 كود الاشتراك">
            <button class="btn btn-purple" onclick="activateManual()">تفعيل الدخول</button>
            <p id="loginMsg" style="margin-top: 15px; font-size: 14px; color: #ff3366;"></p>
        </div>
    </div>

    <div id="mainScreen" class="screen">
        <div class="card">
            <div class="title">لوحة <span>التحكم</span></div>
            <div class="expiry-timer" id="mainExpiryText">جاري حساب الوقت...</div>
            
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <button class="btn btn-primary" onclick="switchScreen('gameScreen')">تخمين Yalla</button>
                <button class="btn btn-success" onclick="window.open('https://wsend.co/905424678123', '_blank')">الدعم الفني ☎</button>
            </div>
            <button class="btn btn-dark" onclick="switchScreen('refundScreen')">استرداد الأموال 💸</button>
        </div>

        <div class="offers-box">
            <h3 style="color: var(--accent); margin-top: 0; text-align: center;">🌟 آخر العروض 🌟</h3>
            <iframe src="https://yasmenjasm2-sketch.github.io/alanatboy/" style="width: 100%; height: 200px; border: none; border-radius: 10px;"></iframe>
        </div>
    </div>

    <div id="gameScreen" class="screen">
        <div class="top-header">
            <div style="font-size: 20px; cursor: pointer;" onclick="switchScreen('mainScreen')">➔ عودة</div>
            <div class="title" style="margin:0;">Yalla <span>AI</span></div>
            <div style="font-size: 20px;">🤖</div>
        </div>

        <div class="ai-status" id="aiStatusText">حالة الذاكرة: نشطة (العقل 1) 🟢</div>

        <div class="fruits-grid">
            <div class="fruit-box" id="fruit_orange">🍊</div>
            <div class="fruit-box" id="fruit_lemon">🍋</div>
            <div class="fruit-box" id="fruit_grape">🍇</div>
            
            <div class="fruit-box" id="fruit_cherry">🍒</div>
            <div class="timer-box" id="gameTimer">00</div>
            <div class="fruit-box" id="fruit_apple">🍎</div>
            
            <div class="fruit-box" id="fruit_watermelon">🍉</div>
            <div class="fruit-box" id="fruit_mango">🥭</div>
            <div class="fruit-box" id="fruit_strawberry">🍓</div>
        </div>

        <div style="width: 100%; max-width: 400px;">
            <input type="text" id="gameInput" class="input-style" placeholder="أدخل اسم الفاكهة الصحيح هنا">
            <button id="btnNewRound" class="btn btn-purple" onclick="handleNewRound()">بدء جولة جديدة 🚀</button>
        </div>
    </div>

    <div id="refundScreen" class="screen">
        <div class="card">
            <div class="title">طلب <span>استرداد</span></div>
            <input type="text" id="refCode" class="input-style" placeholder="🔑 كود الاشتراك">
            <input type="text" id="refName" class="input-style" placeholder="👤 الاسم الكامل">
            <input type="text" id="refPhone" class="input-style" placeholder="📱 رقم الهاتف">
            <textarea id="refReason" class="input-style" placeholder="❓ سبب الاسترداد" rows="3"></textarea>
            
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-success" onclick="sendRefund()">إرسال الطلب</button>
                <button class="btn btn-dark" onclick="switchScreen('mainScreen')">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        /* =========================================================
           إعدادات الأمان والتشفير (مطابقة لكود الجافا تماماً)
           ========================================================= */
        const SECRET_KEY = "FawakihaSecure2026X";
        const BOT_TOKEN = atob("NzcyODkyNTMwOTpBQUV5T2UwZlZZTEpoQ3V1c0d3VWtJTThyd0ZIRTdRYkkwcw==");
        const CHAT_ID = atob("NTk5ODI1MDM2Nw==");

        // إنشاء أو استرجاع Device ID
        let deviceId = localStorage.getItem("android_id");
        if (!deviceId) {
            deviceId = '100' + Math.floor(Math.random() * 9000000000) + Date.now().toString().slice(-2);
            localStorage.setItem("android_id", deviceId);
        }

        // دوال التشفير وفك التشفير XOR + Base64
        function encryptData(text) {
            if (!text) return "";
            try {
                let result = "";
                text = unescape(encodeURIComponent(text));
                for (let i = 0; i < text.length; i++) {
                    result += String.fromCharCode(text.charCodeAt(i) ^ SECRET_KEY.charCodeAt(i % SECRET_KEY.length));
                }
                return btoa(result);
            } catch (e) { return ""; }
        }

        function decryptData(base64) {
            if (!base64) return "";
            try {
                let text = atob(base64);
                let result = "";
                for (let i = 0; i < text.length; i++) {
                    result += String.fromCharCode(text.charCodeAt(i) ^ SECRET_KEY.charCodeAt(i % SECRET_KEY.length));
                }
                return decodeURIComponent(escape(result));
            } catch (e) { return ""; }
        }

        /* =========================================================
           نظام التنقل واشتراكات التطبيق
           ========================================================= */
        let globalExpiryTimer;
        
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');
        }

        // استقبال التفعيل عبر الرابط (app://success_auth?code=...&expiry_time=...)
        function checkUrlParams() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('code') && urlParams.has('expiry_time')) {
                const code = urlParams.get('code');
                const expiryTime = parseInt(urlParams.get('expiry_time'));
                activateSubscription(expiryTime, code);
                // تنظيف الرابط
                window.history.replaceState({}, document.title, window.location.pathname);
            } else {
                checkLocalSubscription();
            }
        }

        function activateSubscription(expiryTime, code) {
            localStorage.setItem("expiry_time_secure", encryptData(expiryTime.toString()));
            if (code) localStorage.setItem("saved_code_secure", encryptData(code));
            
            alert("تم التفعيل بنجاح ✅");
            sendTelegramNotice(`🟢 إشعار تسجيل دخول جديد\n\n🆔 بصمة الجهاز: ${deviceId}\n🔑 كود الاشتراك: ${code}`);
            checkLocalSubscription();
        }

        // التفعيل اليدوي من شاشة الدخول (للتجربة أو الطوارئ)
        function activateManual() {
            const code = document.getElementById('subCode').value;
            if(!code) return;
            // تفعيل افتراضي لمدة 30 يوم من الآن عند إدخال كود يدويا
            const expiry = Date.now() + (30 * 24 * 60 * 60 * 1000);
            activateSubscription(expiry, code);
        }

        function checkLocalSubscription() {
            const encryptedExpiry = localStorage.getItem("expiry_time_secure");
            let expiryTime = 0;
            if (encryptedExpiry) {
                expiryTime = parseInt(decryptData(encryptedExpiry));
            }

            if (expiryTime > Date.now()) {
                switchScreen('mainScreen');
                startGlobalTimer(expiryTime);
            } else {
                switchScreen('loginScreen');
                if (encryptedExpiry) alert("انتهى الاشتراك ⏳\nيرجى التجديد.");
            }
        }

        function startGlobalTimer(expiryTime) {
            clearInterval(globalExpiryTimer);
            globalExpiryTimer = setInterval(() => {
                const timeLeft = expiryTime - Date.now();
                if (timeLeft <= 0) {
                    clearInterval(globalExpiryTimer);
                    localStorage.removeItem("expiry_time_secure");
                    alert("انتهى الاشتراك ⏳");
                    switchScreen('loginScreen');
                    return;
                }
                const days = Math.floor(timeLeft / (1000 * 60 * 60 * 24));
                const hours = Math.floor((timeLeft % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);
                
                let timeStr = days > 0 ? `متبقي: ${days} يوم و ${hours}:${minutes}:${seconds}` : `متبقي: ${hours}:${minutes}:${seconds}`;
                document.getElementById('mainExpiryText').innerText = timeStr;
            }, 1000);
        }

        /* =========================================================
           نظام إرسال التليجرام
           ========================================================= */
        function sendTelegramNotice(message) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}`
            }).catch(e => console.log("Telegram Error"));
        }

        function sendRefund() {
            const code = document.getElementById('refCode').value;
            const name = document.getElementById('refName').value;
            const phone = document.getElementById('refPhone').value;
            const reason = document.getElementById('refReason').value;

            if(!code || !name || !phone || !reason) {
                alert("يرجى تعبئة جميع الحقول."); return;
            }

            const msg = `🔴 طلب استرداد أموال جديد\n\n🆔 بصمة الجهاز: ${deviceId}\n🔑 كود الاشتراك: ${code}\n👤 الاسم: ${name}\n📱 الهاتف: ${phone}\n❓ السبب: ${reason}`;
            sendTelegramNotice(msg);
            alert("تم إرسال طلبك بنجاح، سيتم مراجعته والتواصل معك قريباً.");
            switchScreen('mainScreen');
        }

        /* =========================================================
           خوارزمية الذكاء الاصطناعي YallaGameActivity (مطابقة للجافا)
           ========================================================= */
        const VALID_FRUITS = ["عنب", "ليمون", "برتقال", "تفاح", "كرز", "بطيخ", "فراولة", "فراوله", "مانجو"];
        const FRUIT_IDS = ["grape", "lemon", "orange", "apple", "cherry", "watermelon", "strawberry", "mango"];
        
        let currentAI = parseInt(localStorage.getItem("CurrentAI")) || 1;
        let wrongGuessesCount = parseInt(localStorage.getItem("WrongGuessesCount")) || 0;
        
        let aiData = {
            1: { occ: JSON.parse(localStorage.getItem("occ1")) || {}, hist: JSON.parse(localStorage.getItem("hist1")) || [] },
            2: { occ: JSON.parse(localStorage.getItem("occ2")) || {}, hist: JSON.parse(localStorage.getItem("hist2")) || [] }
        };
        
        let isAIActive = true;
        let lastRoundGuesses = [];
        let gameTimerInterval;

        function updateAIStatusUI() {
            const el = document.getElementById('aiStatusText');
            if (isAIActive) {
                el.innerText = `حالة الذاكرة: نشطة (العقل ${currentAI}) 🟢`;
                el.style.color = "#4CAF50";
            } else {
                el.innerText = `تم ايقاف AI من قبل المطور ⛔`;
                el.style.color = "#D32F2F";
            }
        }

        document.getElementById('gameInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleNewRound();
        });

        function handleNewRound() {
            const inputEl = document.getElementById('gameInput');
            const fruitName = inputEl.value.trim().toLowerCase();

            if (fruitName !== "") {
                if (VALID_FRUITS.includes(fruitName)) {
                    processUserFruit(translateFruit(fruitName));
                    inputEl.value = "";
                } else {
                    alert("🤖 نظام الذكاء الاصطناعي:\nيرجى إدخال إحدى الفواكه المعتمدة للنظام.");
                    return;
                }
            }
            executeAiRound();
        }

        function translateFruit(input) {
            switch (input) {
                case "عنب": return "grape"; case "ليمون": return "lemon"; case "برتقال": return "orange";
                case "تفاح": return "apple"; case "كرز": return "cherry"; case "بطيخ": return "watermelon";
                case "فراولة": case "فراوله": return "strawberry"; case "مانجو": return "mango";
                default: return input;
            }
        }

        function processUserFruit(fruitId) {
            if (!isAIActive) return;

            if (lastRoundGuesses.length > 0) {
                if (!lastRoundGuesses.includes(fruitId)) {
                    wrongGuessesCount++;
                } else {
                    wrongGuessesCount = 0;
                }
            }

            if (wrongGuessesCount > 3) {
                currentAI = currentAI === 1 ? 2 : 1;
                wrongGuessesCount = 0;
                updateAIStatusUI();
                alert(`تم تبديل الذاكرة الاصطناعية (العقل ${currentAI}) لتحسين الأداء!`);
            }

            let activeOcc = aiData[currentAI].occ;
            let activeHist = aiData[currentAI].hist;

            activeOcc[fruitId] = (activeOcc[fruitId] || 0) + 1;
            activeHist.push(fruitId);

            if (activeHist.length > 10) {
                let forgotten = activeHist.shift();
                if (activeOcc[forgotten] > 1) {
                    activeOcc[forgotten]--;
                } else {
                    delete activeOcc[forgotten];
                }
            }

            saveAIData();
        }

        function saveAIData() {
            localStorage.setItem("CurrentAI", currentAI);
            localStorage.setItem("WrongGuessesCount", wrongGuessesCount);
            localStorage.setItem("occ1", JSON.stringify(aiData[1].occ));
            localStorage.setItem("hist1", JSON.stringify(aiData[1].hist));
            localStorage.setItem("occ2", JSON.stringify(aiData[2].occ));
            localStorage.setItem("hist2", JSON.stringify(aiData[2].hist));
        }

        function executeAiRound() {
            // تصفير الألوان
            document.querySelectorAll('.fruit-box').forEach(el => el.classList.remove('fruit-active'));
            
            let predictionWeights = {};
            let isConfirmedGuess = false;

            // أوزان أساسية
            FRUIT_IDS.forEach(f => {
                predictionWeights[f] = Math.floor(Math.random() * 5) + 1; // 1 to 5
            });

            // إزالة المتكرر المباشر حسب الجافا
            if (lastRoundGuesses.includes("cherry")) delete predictionWeights["cherry"];
            if (lastRoundGuesses.includes("watermelon")) delete predictionWeights["watermelon"];

            if (isAIActive) {
                let activeOcc = aiData[currentAI].occ;
                let activeHist = aiData[currentAI].hist;

                for (let fruit in activeOcc) {
                    let count = activeOcc[fruit];
                    if (predictionWeights[fruit] !== undefined) {
                        if (count === 2) {
                            predictionWeights[fruit] = Math.floor(Math.random() * 11) + 5; // 5-15
                            isConfirmedGuess = true;
                        } else if (count >= 4) {
                            predictionWeights[fruit] = Math.floor(Math.random() * 16) + 5; // 5-20
                            isConfirmedGuess = true;
                        }
                    }
                }

                if (activeHist.length >= 9 && Math.random() < 0.40) {
                    let targetIndex = Math.random() > 0.5 ? 1 : 2;
                    let smartFruit = activeHist[targetIndex];
                    if (predictionWeights[smartFruit] !== undefined) {
                        predictionWeights[smartFruit] = Math.floor(Math.random() * 11) + 20; // 20-30
                        isConfirmedGuess = true;
                    }
                }
            }

            let totalWeight = 0;
            let maxWeight = 0;
            for (let f in predictionWeights) {
                totalWeight += predictionWeights[f];
                if (predictionWeights[f] > maxWeight) maxWeight = predictionWeights[f];
            }

            let confidence = totalWeight > 0 ? (maxWeight * 100 / totalWeight) : 0;
            let boxesToShow = (isConfirmedGuess && confidence >= 65) ? 3 : 4;

            // نظام اليانصيب (Lottery List)
            let lotteryList = [];
            for (let f in predictionWeights) {
                for (let i = 0; i < predictionWeights[f]; i++) {
                    lotteryList.push(f);
                }
            }

            // خلط المصفوفة
            lotteryList = lotteryList.sort(() => Math.random() - 0.5);

            let finalGuesses = [];
            for (let i = 0; i < lotteryList.length; i++) {
                if (!finalGuesses.includes(lotteryList[i])) {
                    finalGuesses.push(lotteryList[i]);
                }
                if (finalGuesses.length === boxesToShow) break;
            }

            lastRoundGuesses = finalGuesses;

            // إظهار النتائج
            finalGuesses.forEach(f => {
                let el = document.getElementById("fruit_" + f);
                if(el) el.classList.add('fruit-active');
            });

            // العداد (23 إلى 38 ثانية)
            let btn = document.getElementById('btnNewRound');
            btn.disabled = true;
            btn.innerText = "جاري التحليل...";
            clearInterval(gameTimerInterval);
            
            let timeLeft = Math.floor(Math.random() * 16) + 23;
            document.getElementById('gameTimer').innerText = timeLeft;

            gameTimerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('gameTimer').innerText = timeLeft < 10 ? "0" + timeLeft : timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(gameTimerInterval);
                    document.getElementById('gameTimer').innerText = "00";
                    btn.disabled = false;
                    btn.innerText = "بدء جولة جديدة 🚀";
                }
            }, 1000);
        }

        /* =========================================================
           نظام الاستماع المستمر لتليجرام (فك تشفير Byte Array والبانر)
           ========================================================= */
        function getDecryptedBotData(arr) {
            return arr.map(b => String.fromCharCode(b - 5)).join('');
        }

        // نفس المصفوفات المستخدمة في الجافا
        const bannerBotToken = getDecryptedBotData([60, 58, 59, 59, 55, 57, 62, 54, 60, 60, 63, 70, 70, 76, 61, 73, 75, 119, 62, 78, 122, 113, 95, 80, 112, 89, 121, 106, 91, 75, 77, 104, 62, 89, 75, 117, 58, 118, 115, 82, 79, 57, 120, 84, 91, 70]);
        const bannerChatId = parseInt(getDecryptedBotData([58, 62, 62, 61, 55, 58, 53, 56, 59, 60]));

        let telegramOffset = 0;
        function pollTelegramUpdates() {
            fetch(`https://api.telegram.org/bot${bannerBotToken}/getUpdates?timeout=30&offset=${telegramOffset}`)
            .then(res => res.json())
            .then(data => {
                if (data.ok && data.result.length > 0) {
                    data.result.forEach(update => {
                        telegramOffset = update.update_id + 1;
                        if (update.message && update.message.chat.id === bannerChatId && update.message.text) {
                            handleTelegramCommand(update.message.text.trim());
                        }
                    });
                }
            })
            .catch(err => console.log("Polling wait..."))
            .finally(() => { setTimeout(pollTelegramUpdates, 3000); });
        }

        function handleTelegramCommand(text) {
            if (text.match(/^23\s+.+$/)) {
                let name = text.substring(3).trim();
                showTelegramBanner(name);
            } else if (text === "ايقافAI") {
                isAIActive = false;
                updateAIStatusUI();
            } else if (text === "تشغيلAI") {
                isAIActive = true;
                updateAIStatusUI();
            }
        }

        function showTelegramBanner(name) {
            const banner = document.getElementById('telegramBanner');
            document.getElementById('telegramBannerText').innerText = name;
            banner.style.right = "20px";
            setTimeout(() => { banner.style.right = "-100%"; }, 4500);
        }

        // بدء التشغيل
        window.onload = () => {
            updateAIStatusUI();
            checkUrlParams();
            pollTelegramUpdates();
        };
    </script>
</body>
</html>
