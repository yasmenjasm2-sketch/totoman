<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>🔴 Delt.io - Remas</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
        }
        
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            margin: 0;
            padding: 0;
            display: block;
            pointer-events: auto;
            z-index: 1; 
        }

        #btn-beta, #btn-wss {
            position: fixed;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            padding: 10px 16px;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            z-index: 999999; 
            font-size: 16px;
            font-family: sans-serif;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        #btn-beta { background: #222; }

        #btn-wss {
            background: #007bff;
            display: none; 
        }

        #btn-fans {
            position: fixed;
            top: calc(50% + 55px);
            right: 20px;
            transform: translateY(-50%);
            padding: 10px 16px;
            color: #fff;
            background: #ff4757; 
            border: none;
            border-radius: 8px;
            cursor: pointer;
            z-index: 999999;
            font-size: 16px;
            font-family: sans-serif;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: 0.2s;
        }

        #btn-fans:hover {
            transform: translateY(-50%) scale(1.05);
            background: #ff6b81;
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            color: white;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999999;
            font-family: sans-serif;
            text-align: center;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #fff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <button id="btn-beta">دخول beta 2</button>
    <button id="btn-wss">WSS</button>
    <button id="btn-fans">Fans</button>

    <div id="loading-screen">
        <div class="spinner"></div>
        <h2>يرجى الانتظار</h2>
        <p>للمعلومية ريماس قامت بتطويرها لكم 🌷</p>
    </div>

    <iframe id="game-frame" src="https://delt.io/" allowfullscreen="true"></iframe>

    <script>
        const btnBeta = document.getElementById("btn-beta");
        const btnWss = document.getElementById("btn-wss");
        const loadingScreen = document.getElementById("loading-screen");
        const btnFans = document.getElementById("btn-fans"); 
        
        let lastWSS = "";
        let fansTabWindow = null; 
        let isAwake = false;

        // دالة لمنع المتصفح من إدخال الصفحة في وضع النوم
        function keepPageAwake() {
            if (isAwake) return;
            isAwake = true;

            // تشغيل مسار صوتي صامت للحفاظ على نشاط الصفحة في الخلفية
            const silentAudio = new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA");
            silentAudio.loop = true;
            silentAudio.play().catch(e => console.log("الصوت الصامت ينتظر تفاعل المستخدم"));

            // تفعيل Wake Lock لمنع قفل الشاشة
            if ('wakeLock' in navigator) {
                navigator.wakeLock.request('screen').catch(err => console.log("Wake Lock Error:", err));
            }
        }

        // تفعيل وضع منع النوم عند أول ضغطة في أي مكان بالشاشة
        document.addEventListener("click", keepPageAwake, { once: true });
        document.addEventListener("keydown", keepPageAwake, { once: true });

        // التقاط أي WebSocket يتم فتحه داخل الصفحة (إن أمكن)
        const OriginalWebSocket = window.WebSocket;
        window.WebSocket = function(url, protocols) {
            if (url.includes('wss://')) {
                lastWSS = url;
            }
            return new OriginalWebSocket(url, protocols);
        };

        btnBeta.addEventListener("click", () => {
            keepPageAwake(); 

            try {
                const docElm = document.documentElement;
                if (docElm.requestFullscreen) {
                    docElm.requestFullscreen().then(() => {
                        if (screen.orientation && screen.orientation.lock) {
                            screen.orientation.lock("landscape").catch(e => console.log("توجيه الشاشة غير مدعوم:", e));
                        }
                    }).catch(e => console.log(e));
                }
            } catch (e) {
                console.log("خطأ في ملء الشاشة:", e);
            }

            loadingScreen.style.display = "flex";
            btnBeta.style.display = "none";
            
            setTimeout(() => {
                loadingScreen.style.display = "none";
                btnWss.style.display = "block";
            }, 3000);
        });

        btnWss.addEventListener("click", () => {
            keepPageAwake();
            if (lastWSS) {
                navigator.clipboard.writeText(lastWSS).then(() => {
                    alert("تم نسخ: " + lastWSS);
                }).catch(() => {
                    // طريقة بديلة للنسخ إذا فشل Clipboard API
                    const tempInput = document.createElement("input");
                    tempInput.value = lastWSS;
                    document.body.appendChild(tempInput);
                    tempInput.select();
                    document.execCommand("copy");
                    document.body.removeChild(tempInput);
                    alert("تم نسخ: " + lastWSS);
                });
            } else {
                alert("لم يتم العثور على WSS بعد، انتظر تحميل اللعبة قليلاً.");
            }
        });

        // برمجة زر Fans للتبديل السريع بدون تحديث
        btnFans.addEventListener("click", () => {
            keepPageAwake(); 

            const urlToOpen = "https://yasmenjasm2-sketch.github.io/totoman/"; 
            const tabName = "RemasFansTab"; // اسم ثابت للتبويب يمنع فتح نسخ مكررة

            if (fansTabWindow && !fansTabWindow.closed) {
                // إذا كان التبويب مفتوحاً، قم بالانتقال إليه فوراً
                fansTabWindow.focus();
            } else {
                // إذا لم يكن مفتوحاً، افتحه وحدد اسمه
                fansTabWindow = window.open(urlToOpen, tabName);
                
                // محاولة عمل Focus للتأكيد
                if (fansTabWindow) {
                    fansTabWindow.focus();
                }
            }
        });

        // إضافة اختصار كيبورد (زر Tab) للتبديل السريع إلى صفحة Fans
        document.addEventListener("keydown", (e) => {
            if (e.code === "Tab") {
                e.preventDefault(); // منع المتصفح من تغيير التحديد الافتراضي
                btnFans.click(); // محاكاة الضغط على زر Fans
            }
        });

    </script>
</body>
</html>
