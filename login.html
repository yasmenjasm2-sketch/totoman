<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔐 بوابة تسجيل الدخول - YALLA FRUIT</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0a0a12;
            color: #d0d0d0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }
        .login-card {
            background: #0d0d1a;
            border: 1px solid #ffd70033;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 10px;
            user-select: none;
        }
        h2 {
            font-size: 20px;
            color: #ffd700;
            margin-bottom: 8px;
            text-shadow: 0 0 10px #ffd70033;
        }
        .subtitle {
            font-size: 12px;
            color: #888;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 18px;
            text-align: right;
        }
        label {
            display: block;
            font-size: 11px;
            color: #aaa;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            background: #050510;
            border: 1px solid #1a1a2a;
            color: #fff;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-family: monospace;
            outline: none;
            transition: border-color 0.3s;
            text-align: center;
            letter-spacing: 2px;
        }
        input:focus {
            border-color: #ffd700;
        }
        .btn {
            width: 100%;
            background: linear-gradient(135deg, #ffd700, #ffa500);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
        .status-msg {
            margin-top: 15px;
            font-size: 12px;
            min-height: 18px;
            font-weight: bold;
        }
        .status-msg.success { color: #4caf50; }
        .status-msg.error { color: #f44336; }
        .status-msg.loading { color: #00bcd4; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">🍒</div>
    <h2>🍒 YALLA FRUIT HACK</h2>
    <div class="subtitle">بوابة الدخول الآمنة والتحقق من الاشتراك</div>

    <div class="form-group">
        <label>أدخل كود الاشتراك الخاص بك:</label>
        <input type="text" id="activationCode" placeholder="YF-XXXX-XXXX" autocomplete="off" style="text-transform: uppercase;">
    </div>

    <button class="btn" onclick="validateAndLogin()">🔑 تسجيل الدخول والتشغيل</button>

    <div class="status-msg" id="statusMessage"></div>
</div>

<!-- تحميل حزمة Firebase الأساسية -->
<script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"></script>

<script>
// إعدادات Firebase المحدثة والمؤكدة
const firebaseConfig = {
    apiKey: "AIzaSyAo4IaLd5SfVYHAAp_noJD7ZXBbhdVx9-0",
    authDomain: "fawakihyallalive.firebaseapp.com",
    databaseURL: "https://fawakihyallalive-default-rtdb.firebaseio.com",
    projectId: "fawakihyallalive",
    storageBucket: "fawakihyallalive.firebasestorage.app",
    messagingSenderId: "917478913649",
    appId: "1:917478913649:android:fee5d42aca81c8a2e3cdd0"
};

const app = firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const appId = "fawakihyallalive";

// التحقق من وجود جلسة صالحة مسبقاً
window.onload = async () => {
    const savedCode = localStorage.getItem('yalla_fruit_active_code');
    const expiryTime = localStorage.getItem('yalla_fruit_expiry');
    
    if (savedCode && expiryTime) {
        if (Date.now() < parseInt(expiryTime)) {
            window.location.href = "index.html";
        } else {
            localStorage.removeItem('yalla_fruit_active_code');
            localStorage.removeItem('yalla_fruit_expiry');
            showStatus("انتهت صلاحية اشتراكك السابق. يرجى تجديده وكتابة كود جديد.", "error");
        }
    }
};

function showStatus(text, type) {
    const msg = document.getElementById('statusMessage');
    msg.textContent = text;
    msg.className = "status-msg " + type;
}

function getDeviceFingerprint() {
    // إنشاء بصمة فريدة للجهاز لمنع استخدام الكود في أكثر من هاتف
    return navigator.userAgent.replace(/\D+/g, '') + screen.width + screen.height;
}

// تسجيل الدخول
async function validateAndLogin() {
    const code = document.getElementById('activationCode').value.trim().toUpperCase();
    if (!code) {
        showStatus("⚠️ يرجى إدخال كود الاشتراك أولاً!", "error");
        return;
    }

    showStatus("⏳ جاري التحقق من الاشتراك وصلاحيته...", "loading");

    try {
        await auth.signInAnonymously();

        const codeDocRef = firebase.firestore().doc(db, 'artifacts', appId, 'public', 'data', 'subscriptions', code);
        const docSnap = await codeDocRef.get();

        if (!docSnap.exists) {
            showStatus("❌ كود الاشتراك غير صحيح أو غير متوفر!", "error");
            return;
        }

        const data = docSnap.data();
        const now = Date.now();

        // 1. التحقق من الحظر
        if (data.isBanned) {
            showStatus("🚫 تم حظر هذا الكود من قبل الإدارة!", "error");
            return;
        }

        // 2. التحقق من الجهاز (إذا تم استخدام الكود من قبل ولم تقم الإدارة بفك ارتباطه)
        const currentDevice = getDeviceFingerprint();
        if (data.isUsed && data.usedByDeviceId && data.usedByDeviceId !== currentDevice) {
            showStatus("📱 هذا الكود مستخدم بالفعل على هاتف آخر! تواصل مع الإدارة لفك الارتباط.", "error");
            return;
        }

        // 3. التحقق من انتهاء الصلاحية
        if (data.expiryTimestamp && now > data.expiryTimestamp) {
            showStatus("⏳ انتهت صلاحية هذا الكود!", "error");
            return;
        }

        // 4. تفعيل الكود إذا كان جديداً (أو تم فك ارتباطه)
        let expiryTimestamp = data.expiryTimestamp;
        
        if (!data.isUsed || !data.usedByDeviceId) {
            const durationDays = data.durationDays || 30;
            // إذا كان جديداً تماماً نحسب تاريخ الانتهاء، وإذا كان مفكوك الارتباط فقط نحتفظ بتاريخه القديم
            expiryTimestamp = data.expiryTimestamp || (now + (durationDays * 24 * 60 * 60 * 1000));
            
            await codeDocRef.update({
                isUsed: true,
                activatedAt: data.activatedAt || now,
                expiryTimestamp: expiryTimestamp,
                usedByDeviceId: currentDevice // ربط الكود بهذا الهاتف
            });
        }

        // حفظ الدخول في الهاتف
        localStorage.setItem('yalla_fruit_active_code', code);
        localStorage.setItem('yalla_fruit_expiry', String(expiryTimestamp));

        showStatus("✅ تم التحقق بنجاح! جاري الدخول...", "success");
        setTimeout(() => {
            window.location.href = "index.html"; // توجيه لملف اللعبة
        }, 1200);

    } catch (error) {
        console.error("Authentication Error:", error);
        showStatus("❌ حدث خطأ في الاتصال بالسيرفر. تأكد من الإنترنت.", "error");
    }
}
</script>
</body>
</html>
