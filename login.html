<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔐 بوابة الاشتراك - YALLA FRUIT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: radial-gradient(circle at 20% 30%, #1a1025, #0a0515);
            color: #e0d7ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* تأثيرات الخلفية الديناميكية */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.1"><path d="M20 20 L30 15 L40 20 L35 30 L25 30 Z" fill="%23ffd700"/><circle cx="70" cy="70" r="8" fill="%23ff8c00"/><circle cx="25" cy="75" r="5" fill="%23ffd700"/></svg>');
            background-size: 200px;
            pointer-events: none;
            z-index: 0;
        }

        /* بطاقة تسجيل الدخول */
        .login-card {
            background: rgba(15, 10, 25, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 32px;
            padding: 30px 25px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -10px rgba(0,0,0,0.8), 0 0 30px rgba(255, 215, 0, 0.2);
            text-align: center;
            position: relative;
            z-index: 2;
            transition: transform 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-3px);
        }

        .logo {
            font-size: 60px;
            margin-bottom: 5px;
            filter: drop-shadow(0 0 15px #ffd700);
            user-select: none;
            animation: float 2s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        h2 {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(to right, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 13px;
            color: #aaa0cc;
            margin-bottom: 28px;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 22px;
            text-align: right;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #b9adff;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            right: 15px;
            color: #ffd700;
            font-style: normal;
            font-size: 16px;
        }

        input {
            width: 100%;
            background: rgba(8, 6, 20, 0.7);
            border: 1px solid rgba(255, 215, 0, 0.2);
            color: #fff;
            padding: 15px 20px;
            border-radius: 14px;
            font-size: 17px;
            font-family: 'Courier New', monospace;
            outline: none;
            transition: all 0.3s;
            text-align: center;
            letter-spacing: 2px;
            font-weight: bold;
            backdrop-filter: blur(5px);
        }

        input:focus {
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            background: rgba(10, 8, 25, 0.9);
        }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #0a0515;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(255, 140, 0, 0.4);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 5px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(255, 200, 0, 0.6);
            filter: brightness(1.1);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .status-msg {
            margin-top: 20px;
            font-size: 13px;
            min-height: 45px;
            font-weight: 600;
            line-height: 1.6;
            border-radius: 12px;
            padding: 10px;
            background: rgba(255,255,255,0.03);
        }

        .status-msg.success {
            color: #00e676;
            background: rgba(0, 230, 118, 0.1);
            border: 1px solid #00e67640;
        }

        .status-msg.error {
            color: #ff5252;
            background: rgba(255, 82, 82, 0.1);
            border: 1px solid #ff525240;
        }

        .status-msg.loading {
            color: #40c4ff;
            background: rgba(64, 196, 255, 0.1);
            border: 1px solid #40c4ff40;
        }

        .footer-note {
            font-size: 10px;
            color: #555;
            margin-top: 20px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">🍒</div>
    <h2>YALLA FRUIT</h2>
    <div class="subtitle">بوابة التحقق الآمن من الاشتراك</div>

    <div class="form-group">
        <label>🔑 كود الاشتراك</label>
        <div class="input-wrapper">
            <i>🎫</i>
            <input type="text" id="activationCode" placeholder="YF-XXXX-XXXX" autocomplete="off" style="text-transform: uppercase;">
        </div>
    </div>

    <button class="btn" onclick="validateAndLogin()">
        <span>🔓</span> تفعيل والدخول
    </button>

    <div class="status-msg" id="statusMessage"></div>
    <div class="footer-note">⚠️ يتم تأمين الاتصال ومراقبة التلاعب</div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    // ==================== إعدادات التشفير والأمان ====================
    const SECRET_SALT = "YF_Secure_2024_Salted_Hamza"; // ملح تشفير ديناميكي
    const ENCRYPTION_KEY = "YallaFruit_AntiCheat_Key_v2"; // مفتاح التلاعب
    
    // تشفير البيانات الحساسة بقاعدة XOR مع ملح
    function encryptData(text, salt = SECRET_SALT) {
        let encrypted = '';
        for (let i = 0; i < text.length; i++) {
            const charCode = text.charCodeAt(i) ^ salt.charCodeAt(i % salt.length);
            encrypted += String.fromCharCode(charCode);
        }
        return btoa(encrypted); // تشفير base64
    }

    function decryptData(encoded, salt = SECRET_SALT) {
        try {
            const text = atob(encoded);
            let decrypted = '';
            for (let i = 0; i < text.length; i++) {
                const charCode = text.charCodeAt(i) ^ salt.charCodeAt(i % salt.length);
                decrypted += String.fromCharCode(charCode);
            }
            return decrypted;
        } catch (e) {
            return null;
        }
    }

    // توليد بصمة جهاز فريدة ومشفرة
    function getSecureFingerprint() {
        const raw = [
            navigator.userAgent,
            screen.width,
            screen.height,
            screen.colorDepth,
            new Date().getTimezoneOffset(),
            navigator.hardwareConcurrency || 4,
            navigator.deviceMemory || 4,
            navigator.language
        ].join('|');
        // تشفير البصمة لتجنب التلاعب السهل
        return encryptData(raw, ENCRYPTION_KEY);
    }

    // ==================== إعدادات Firebase ====================
    const firebaseConfig = {
        apiKey: "AIzaSyDr0kbQDE90hhEMohV6X1b4ndu4L7uZz24",
        authDomain: "mehamzaalanat.firebaseapp.com",
        databaseURL: "https://mehamzaalanat-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "mehamzaalanat",
        storageBucket: "mehamzaalanat.firebasestorage.app",
        messagingSenderId: "10248497310",
        appId: "1:10248497310:android:bc2b88983738827f15338f"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const APP_ID = "mehamzaalanat";

    // المتغيرات العامة للجلسة
    let serverTimestamp = null;
    let timeDriftDetected = false;

    // ==================== الحماية من التلاعب بالوقت ====================
    async function getSecureServerTime() {
        try {
            // استخدام وقت Firestore كمرجع موثوق
            const timeDoc = await db.collection('artifacts').doc(APP_ID).collection('public').doc('server_time').get();
            if (timeDoc.exists && timeDoc.data().timestamp) {
                serverTimestamp = timeDoc.data().timestamp;
            } else {
                // إنشاء مستند الوقت إذا لم يوجد (مرة واحدة)
                const now = firebase.firestore.Timestamp.now();
                await db.collection('artifacts').doc(APP_ID).collection('public').doc('server_time').set({
                    timestamp: now,
                    label: 'do_not_modify'
                });
                serverTimestamp = now.toMillis();
            }
        } catch (e) {
            // فشل آمن: استخدم وقت العميل كحل أخير مع تسجيل التحذير
            console.warn('تعذر جلب وقت السيرفر، استخدام وقت محلي مع تحقق إضافي');
            serverTimestamp = Date.now();
        }
        return serverTimestamp;
    }

    function detectTimeManipulation(clientTime, serverTime) {
        const difference = Math.abs(clientTime - serverTime);
        // إذا كان الفرق أكثر من 5 دقائق (300000 مللي)، نعتبره تلاعباً
        if (difference > 300000) {
            timeDriftDetected = true;
            console.error('⚠️ تم اكتشاف فرق توقيت كبير: ' + difference + ' مللي ثانية');
            return true;
        }
        return false;
    }

    // ==================== دوال واجهة المستخدم ====================
    function showStatus(text, type) {
        const msg = document.getElementById('statusMessage');
        msg.innerHTML = text;
        msg.className = "status-msg " + type;
    }

    // تنظيف التخزين المحمي
    function clearSecureStorage() {
        localStorage.removeItem('yf_encrypted_code');
        localStorage.removeItem('yf_encrypted_expiry');
        localStorage.removeItem('yf_checksum');
        localStorage.removeItem('yf_device_hash');
    }

    // تخزين آمن مع فحص صحة
    function secureStore(code, expiryTimestamp) {
        const encryptedCode = encryptData(code);
        const encryptedExpiry = encryptData(expiryTimestamp.toString());
        const checksum = encryptData(code + expiryTimestamp + getSecureFingerprint());
        
        localStorage.setItem('yf_encrypted_code', encryptedCode);
        localStorage.setItem('yf_encrypted_expiry', encryptedExpiry);
        localStorage.setItem('yf_checksum', checksum);
        localStorage.setItem('yf_device_hash', getSecureFingerprint());
    }

    // التحقق من صحة التخزين (يكشف التلاعب)
    function isStorageIntact() {
        try {
            const encCode = localStorage.getItem('yf_encrypted_code');
            const encExpiry = localStorage.getItem('yf_encrypted_expiry');
            const storedChecksum = localStorage.getItem('yf_checksum');
            const storedDevice = localStorage.getItem('yf_device_hash');
            
            if (!encCode || !encExpiry || !storedChecksum || !storedDevice) return false;
            
            const code = decryptData(encCode);
            const expiry = decryptData(encExpiry);
            const currentDevice = getSecureFingerprint();
            
            if (!code || !expiry || storedDevice !== currentDevice) return false;
            
            const expectedChecksum = encryptData(code + expiry + currentDevice);
            return storedChecksum === expectedChecksum;
        } catch (e) {
            return false;
        }
    }

    // قراءة آمنة للتخزين
    function getSecureStoredData() {
        if (!isStorageIntact()) {
            clearSecureStorage();
            return null;
        }
        const code = decryptData(localStorage.getItem('yf_encrypted_code'));
        const expiry = parseInt(decryptData(localStorage.getItem('yf_encrypted_expiry')));
        return { code, expiry };
    }

    // ==================== آلية الدخول التلقائي عند التحميل ====================
    window.onload = async () => {
        // أولاً: جلب وقت السيرفر للتحقق من التلاعب
        await getSecureServerTime();
        
        const storedData = getSecureStoredData();
        if (storedData && storedData.expiry) {
            const clientNow = Date.now();
            const secureNow = serverTimestamp || clientNow;
            
            // فحص التلاعب بالوقت
            if (detectTimeManipulation(clientNow, secureNow)) {
                clearSecureStorage();
                showStatus("⛔ تم اكتشاف تلاعب في توقيت الجهاز. يرجى ضبط الوقت تلقائياً.", "error");
                return;
            }
            
            // استخدام وقت السيرفر للمقارنة
            if (secureNow < storedData.expiry) {
                window.location.href = "hamzaz.html"; // ✅ التوجيه إلى الملف المطلوب
                return;
            } else {
                clearSecureStorage();
                showStatus("⏳ انتهت صلاحية الاشتراك، يرجى إدخال كود جديد.", "error");
            }
        }
    };

    // ==================== عملية التحقق الرئيسية ====================
    async function validateAndLogin() {
        const codeInput = document.getElementById('activationCode');
        let code = codeInput.value.trim().toUpperCase();
        
        if (!code) {
            showStatus("⚠️ يرجى إدخال كود الاشتراك أولاً!", "error");
            return;
        }

        // تعطيل الزر مؤقتاً لمنع الضغط المزدوج
        const btn = document.querySelector('.btn');
        btn.disabled = true;
        btn.style.opacity = '0.7';
        
        showStatus("⏳ جاري الاتصال بالسيرفر الآمن والتحقق من السلامة...", "loading");

        try {
            // 1. تأكيد وقت السيرفر المحدث
            await getSecureServerTime();
            const currentServerTime = serverTimestamp || Date.now();
            
            // 2. فحص تلاعب الوقت مبكراً
            if (detectTimeManipulation(Date.now(), currentServerTime)) {
                showStatus("⛔ فشل التحقق الأمني: تلاعب في توقيت الجهاز. الرجاء تفعيل الوقت التلقائي.", "error");
                btn.disabled = false;
                btn.style.opacity = '1';
                return;
            }

            // 3. تسجيل دخول مجهول
            await auth.signInAnonymously();
            
            // 4. جلب بيانات الكود من Firestore
            const codeDocRef = db.collection('artifacts').doc(APP_ID)
                .collection('public').doc('data')
                .collection('subscriptions').doc(code);
                
            const docSnap = await codeDocRef.get();

            if (!docSnap.exists) {
                showStatus("❌ كود الاشتراك غير صحيح أو منتهي الصلاحية.", "error");
                btn.disabled = false;
                btn.style.opacity = '1';
                return;
            }

            const data = docSnap.data();
            const deviceFingerprint = getSecureFingerprint();

            // فحوصات الأمان المتقدمة
            if (data.isBanned === true) {
                showStatus("🚫 تم حظر هذا الكود بسبب انتهاك سياسة الاستخدام.", "error");
                btn.disabled = false;
                btn.style.opacity = '1';
                return;
            }

            if (data.isUsed && data.deviceHash && data.deviceHash !== deviceFingerprint) {
                showStatus("📱 هذا الكود مرتبط بجهاز آخر. لا يمكن استخدامه هنا.", "error");
                btn.disabled = false;
                btn.style.opacity = '1';
                return;
            }

            // التحقق من الصلاحية باستخدام وقت السيرفر
            const expiryFromServer = data.expiryTimestamp;
            if (expiryFromServer && currentServerTime > expiryFromServer) {
                showStatus("⌛ انتهت صلاحية الكود. يرجى تجديد الاشتراك.", "error");
                btn.disabled = false;
                btn.style.opacity = '1';
                return;
            }

            // تجهيز بيانات التفعيل
            let finalExpiry;
            const durationDays = data.durationDays || 30;
            
            if (!data.isUsed || !data.deviceHash) {
                // أول تفعيل
                finalExpiry = currentServerTime + (durationDays * 24 * 60 * 60 * 1000);
                
                // كتابة بيانات التفعيل مع البصمة المشفرة
                await codeDocRef.update({
                    isUsed: true,
                    activatedAt: firebase.firestore.Timestamp.fromMillis(currentServerTime),
                    expiryTimestamp: finalExpiry,
                    deviceHash: deviceFingerprint,
                    lastVerified: firebase.firestore.Timestamp.fromMillis(currentServerTime)
                });
            } else {
                // إعادة دخول لجهاز موثوق
                finalExpiry = expiryFromServer;
                await codeDocRef.update({
                    lastVerified: firebase.firestore.Timestamp.fromMillis(currentServerTime)
                });
            }

            // تخزين آمن ومشفر محلياً
            secureStore(code, finalExpiry);
            
            showStatus("✅ تم التحقق! جاري توجيهك إلى لوحة التحكم...", "success");
            
            setTimeout(() => {
                window.location.href = "hamzaz.html"; // ✅ التوجيه النهائي
            }, 1000);

        } catch (error) {
            console.error("فشل العملية:", error);
            let errorMsg = "فشل الاتصال بالسيرفر.";
            if (error.code === 'permission-denied') {
                errorMsg = "صلاحيات غير كافية. تأكد من هيكل قاعدة البيانات.";
            } else if (error.code === 'unavailable') {
                errorMsg = "السيرفر غير متاح حالياً، حاول لاحقاً.";
            }
            showStatus(`❌ ${errorMsg}<br><small style="opacity:0.8;">كود: ${error.code || 'unknown'}</small>`, "error");
        } finally {
            btn.disabled = false;
            btn.style.opacity = '1';
        }
    }
</script>
</body>
</html>
